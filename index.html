<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Mon Suivi</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060809;--surface:#090d10;--surface2:#0d1318;--border:#0f2030;--border2:#163040;--text:#d0eeff;--muted:#2a4a5a;--subtle:#4a7a90;--accent:#00e5ff;--accent2:#0070ff;--green:#69ff47;--amber:#ffd600;--danger:#ff3d71;--pink:#ff4081;--purple:#d580ff;--orange:#ff6d00}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--text)}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px}
/* HEADER */
.header{background:rgba(6,8,9,.95);padding:16px 16px 0;position:sticky;top:0;z-index:99;border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.brand-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:3px}
.brand-title{font-family:'Archivo Black',sans-serif;font-size:28px;color:var(--text);text-transform:uppercase;line-height:1}
.date-pick{background:var(--surface2);border:1px solid var(--border2);color:var(--accent);border-radius:8px;padding:6px 10px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;outline:none}
.stats-row{display:flex;gap:5px;margin-bottom:12px}
.chip{flex:1;background:var(--surface);border-radius:8px;padding:8px 8px;border:1px solid var(--border);min-width:0}
.chip-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:600;color:var(--subtle);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.chip-val{font-family:'Archivo Black',sans-serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 1 0;min-width:0;padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;color:var(--subtle);white-space:nowrap;transition:all .2s;text-align:center}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}
/* CONTENT */
.content{padding:16px}
.card{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.card.accent{border-color:rgba(0,229,255,.2)}
.card.green{border-color:rgba(105,255,71,.2)}
.card.purple{border-color:rgba(213,128,255,.2)}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--subtle);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px}
.slbl.accent{color:var(--accent)}
.slbl.green{color:var(--green)}
.slbl.purple{color:var(--purple)}
/* BILAN */
.cal-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cal-big{font-family:'Archivo Black',sans-serif;font-size:52px;line-height:1;letter-spacing:-1px}
.cal-goal{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--subtle)}
.bar-track{height:6px;border-radius:99px;background:var(--border);overflow:hidden;margin-bottom:2px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.macros-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:14px}
.mcell{background:var(--surface2);border-radius:8px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.mcell-val{font-family:'Archivo Black',sans-serif;font-size:22px;line-height:1;margin-bottom:2px}
.mcell-unit{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted)}
.mcell-name{font-size:8px;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;font-weight:600}
.mcell-range{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);margin-top:1px}
.mbar{height:3px;border-radius:99px;background:var(--border);margin-top:5px;overflow:hidden}
/* REPAS SECTION */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-family:'Archivo Black',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.3px}
/* REPAS TYPE SELECTOR */
.rtype-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
/* MODE BAR */
.mode-bar{display:flex;gap:6px;margin-bottom:12px}
/* REPAS GROUP */
.rgroup{margin-bottom:14px}
.rgroup-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.rgroup-name{font-family:'Archivo Black',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.rgroup-line{flex:1;height:1px;background:var(--border)}
.rgroup-sum{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--subtle);font-weight:600}
/* FOOD ROW */
.food-row{background:var(--surface2);border-radius:9px;padding:11px 12px;margin-bottom:7px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.food-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{border-radius:4px;padding:2px 7px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px}
.t-kcal{background:rgba(255,214,0,.1);color:var(--amber);border:1px solid rgba(255,214,0,.2)}
.t-prot{background:rgba(255,64,129,.1);color:var(--pink);border:1px solid rgba(255,64,129,.2)}
.t-gluc{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2)}
.t-lip{background:rgba(255,109,0,.1);color:var(--orange);border:1px solid rgba(255,109,0,.2)}
.t-fib{background:rgba(105,255,71,.1);color:var(--green);border:1px solid rgba(105,255,71,.2)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1;border-radius:4px}
.del-btn:hover{color:var(--danger)}
/* FORM */
.form-card{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--border2);margin-bottom:10px}
.inp-wrap{margin-bottom:8px}
.inp-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
input[type=text],input[type=number],input[type=time],textarea,select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Barlow Condensed',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* BUTTONS */
.btn{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;border:none;transition:all .15s;letter-spacing:1.5px;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000}
.btn-ghost{background:var(--surface2);color:var(--subtle);border:1px solid var(--border2)}
.btn-green{background:var(--green);color:#000;font-weight:800}
.btn-amber{background:var(--amber);color:#000;font-weight:800}
.btn-danger{background:rgba(255,61,113,.15);color:var(--danger);border:1px solid rgba(255,61,113,.25)}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:6px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
/* AUTOCOMPLETE */
.ac-wrap{position:relative;margin-bottom:8px}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:#0a1318;border:1px solid var(--border2);border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;margin-top:3px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ac-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:rgba(0,229,255,.08)}
.ac-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.ac-ref{font-size:10px;color:var(--muted);margin-top:1px}
.ac-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--subtle)}
.portion-row{display:flex;align-items:center;gap:10px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.portion-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;flex:1}
.portion-in{width:70px!important;font-family:'Archivo Black',sans-serif;font-size:18px;text-align:center;padding:6px 8px!important}
.macro-prev{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
/* POIDS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-stat{text-align:center}
.prog-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:600;color:var(--subtle);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.prog-val{font-family:'Archivo Black',sans-serif;font-size:30px;line-height:1}
.prog-val-sm{font-family:'Archivo Black',sans-serif;font-size:20px;line-height:1}
.delta{text-align:center;margin-top:10px;font-family:'Archivo Black',sans-serif;font-size:15px;letter-spacing:.5px}
.hist-row{background:var(--surface2);border-radius:9px;padding:12px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.hist-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--subtle);margin-bottom:3px}
.hist-delta{font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.hist-w{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--accent)}
/* TRAINING */
.exo-row{background:var(--surface2);border-radius:10px;padding:12px 13px;margin-bottom:7px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.exo-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.km-box{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:8px;padding:8px 12px;text-align:center;white-space:nowrap}
.km-dep-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;color:var(--subtle);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.km-dep-val{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--accent)}
.seance-type{font-family:'Archivo Black',sans-serif;font-size:15px;color:var(--amber);text-transform:uppercase}
.tr-hist-row{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
/* SOMMEIL */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.time-in{font-family:'Archivo Black',sans-serif!important;font-size:22px!important;text-align:center!important;padding:12px!important}
.sleep-dur{display:flex;align-items:baseline;gap:6px;justify-content:center;padding:18px 0}
.sleep-h{font-family:'Archivo Black',sans-serif;font-size:52px;letter-spacing:-2px;line-height:1}
.sleep-unit{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.sleep-status{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sleep-hist-row{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:7px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
/* RECAP */
.recap-area{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:'Barlow Condensed',sans-serif;outline:none;resize:none;line-height:1.6;min-height:120px;transition:border-color .2s}
.recap-area:focus{border-color:var(--accent)}
.recap-area::placeholder{color:var(--muted)}
.guide-toggle{background:none;border:none;color:var(--subtle);font-size:10px;font-family:'Barlow Condensed',sans-serif;cursor:pointer;padding:4px 0;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.guide-block{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;padding:10px 13px;margin-bottom:10px}
.guide-row{margin-bottom:7px}
.guide-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.guide-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--subtle);background:var(--bg);padding:4px 8px;border-radius:5px}
.parsed-block{background:var(--surface);border:1px solid rgba(105,255,71,.2);border-radius:12px;padding:16px;margin-bottom:10px}
.parsed-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.parsed-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.parsed-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);letter-spacing:2px;text-transform:uppercase}
.parsed-sub{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:2.5px;text-transform:uppercase;margin:10px 0 7px}
.parsed-table{width:100%;border-collapse:collapse;background:var(--surface2);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.parsed-table th{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);font-weight:400}
.parsed-table th:first-child{text-align:left}
.parsed-table td{padding:9px 8px;border-bottom:1px solid rgba(15,32,48,.6);font-size:12px;vertical-align:middle}
.parsed-table td:first-child{font-weight:700;color:var(--text);padding-left:10px;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.parsed-table td:not(:first-child){text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px}
.parsed-table tr:last-child td{border-bottom:none}
.td-kcal{color:var(--amber)}.td-prot{color:var(--pink)}.td-gluc{color:var(--accent)}.td-lip{color:var(--orange)}.td-empty{color:var(--muted)}
.parsed-total td{border-top:1px solid var(--border2);font-weight:700}
.exo-parsed-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,214,0,.04);border:1px solid rgba(255,214,0,.12);border-radius:8px;margin-bottom:6px}
.exo-p-name{flex:1;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.exo-p-sets{font-family:'Archivo Black',sans-serif;font-size:17px;color:var(--amber);line-height:1}
.exo-p-charge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);background:rgba(213,128,255,.1);border:1px solid rgba(213,128,255,.2);border-radius:5px;padding:2px 7px}
/* DB */
.db-item{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:7px;border:1px solid var(--border)}
.db-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.db-name{font-weight:700;font-size:14px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px;text-transform:uppercase}
.db-ref{font-size:10px;color:var(--subtle);margin-top:1px}
.incomplete{background:rgba(255,214,0,.12);color:var(--amber);border:1px solid rgba(255,214,0,.2);border-radius:5px;padding:1px 6px;font-size:9px;font-family:'JetBrains Mono',monospace;margin-left:6px}
.separator{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;color:var(--subtle);padding:30px 0;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase}
/* SAVE/RESTORE */
.save-bar{display:flex;gap:8px;margin-bottom:14px}
.save-msg{background:rgba(105,255,71,.1);border:1px solid rgba(105,255,71,.2);color:var(--green);border-radius:8px;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
/* SEMAINE */
.wk-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.wk-box{background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border);text-align:center}
.wk-val{font-family:'Archivo Black',sans-serif;font-size:26px;line-height:1;margin-bottom:3px}
.wk-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:2px;text-transform:uppercase}
.wk-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}
.wk-day-row{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.wk-day-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.wk-day-tags{display:flex;gap:4px;flex-wrap:wrap}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}

/* ─── MICRO MODULE ─── */


  /* HEADER */

  header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mc-date-display {
    font-size: 0.85rem;
    color: var(--subtle);
    letter-spacing: 1px;
  }

  /* NAV TABS */
  .mc-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 4px;
    overflow-x: auto;
  }

  .mc-tab {
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--subtle);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }

  .mc-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* PAGES */
  .mc-page { display: none; padding: 16px; }
  .mc-page.active { display: block; }

  /* SECTION TITLE */
  .mc-section-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .mc-section-title:first-child { margin-top: 0; }

  /* CARD */
  .mc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }

  /* MICRONUTRIENT BARS */
  .mc-micro-item {
    margin-bottom: 14px;
  }

  .micro-

  .mc-micro-name {
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }

  .mc-micro-values {
    font-size: 0.8rem;
    color: var(--subtle);
  }

  .mc-micro-values span {
    font-weight: 700;
  }

  .mc-bar-bg {
    background: var(--border);
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
    position: relative;
  }

  .mc-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
    position: relative;
  }

  .mc-bar-fill.ok { background: var(--green); }
  .mc-bar-fill.warn { background: var(--amber); }
  .mc-bar-fill.low { background: var(--pink); }
  .mc-bar-fill.over { background: var(--accent); width: 100% !important; }

  .mc-micro-pct {
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 3px;
    text-align: right;
  }
  .mc-micro-pct.ok { color: var(--green); }
  .mc-micro-pct.warn { color: var(--amber); }
  .mc-micro-pct.low { color: var(--pink); }
  .mc-micro-pct.over { color: var(--accent); }

  /* ALERTE CARENCE */
  .mc-alert-box {
    border-radius: 6px;

function calcDuree(coucher, lever) {
  if (!coucher||!lever) return null;
  const [hC,mC]=coucher.split(":").map(Number);
  const [hL,mL]=lever.split(":").map(Number);
  let mins=(hL*60+mL)-(hC*60+mC);
  if(mins<0) mins+=1440;
  return {h:Math.floor(mins/60), m:mins%60, total:mins};
}

// ─── PARSER ───────────────────────────────────────────────────────────────────
function parseRecap(text) {
  const result = {poids:null, repas:[], entrainement:{type:"",exercices:[]}};
  const pm = text.match(/poids[:\s]+(\d+[.,]\d+|\d+)\s*kg?/i);
  if (pm) result.poids = pm[1].replace(",",".");
  const seanceTypes = ["push","pull","legs","leg day","full body","fullbody","chest","back","épaules","bras","cardio","pecs","dos","biceps","triceps"];
  for (const t of seanceTypes) {
    if (text.toLowerCase().includes(t)) { result.entrainement.type = t[0].toUpperCase()+t.slice(1); break; }
  }
  const exoRe = /([A-Za-zÀ-ÿ\s]+?)\s+(\d+)\s*[x×]\s*(\d+)\s*(?:reps?)?\s*@?\s*(\d+(?:[.,]\d+)?)\s*kg/gi;
  let m;
  while ((m=exoRe.exec(text))!==null) {
    const n=m[1].trim().replace(/[,;:-–]+$/,"").trim();
    if (n.length>1) result.entrainement.exercices.push({id:Date.now()+Math.random(),nom:n[0].toUpperCase()+n.slice(1),series:m[2],reps:m[3],charge:m[4].replace(",",".")});
  }
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]/gu," ").replace(/[≈~•]/g,"").replace(/\s{2,}/g," ");
  const segs = clean.split(/[,;\n]+/);
  for (const seg of segs) {
    const s=seg.trim();
    if (!s||s.toLowerCase().includes("poids")||/\d\s*[x×]\s*\d/.test(s)) continue;
    const cal=s.match(/(\d+(?:[.,]\d+)?)\s*(?:kcal|cal)(?!\w)/i)?.[1];
    const prot=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:prot[eé]ines?|prot\b|(?<![a-zA-Z0-9])p(?![a-zA-Z0-9]))/i)?.[1];
    const gluc=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:glucides?|gluc\b)/i)?.[1];
    const lip=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:lipides?|lip\b|(?<![a-zA-Z0-9])l(?![a-zA-Z0-9]))/i)?.[1];
    if (!cal&&!prot) continue;
    const nm=s.match(/^([A-Za-zÀ-ÿ\s'\-]+?)(?=\s*\d)/);
    if (!nm) continue;
    const nom=nm[1].trim().replace(/[,;:\-–]+$/,"").trim();
    if (nom.length<2) continue;
    result.repas.push({id:Date.now()+Math.random(),nom:nom[0].toUpperCase()+nom.slice(1),cal:cal?String(parseFloat(cal.replace(",","."))):"",prot:prot?String(parseFloat(prot.replace(",","."))):"",gluc:gluc?String(parseFloat(gluc.replace(",","."))):"",lip:lip?String(parseFloat(lip.replace(",","."))):"",fib:""});
  }
  return result;
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==="className") e.className=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="style") Object.assign(e.style, v);
    else if (k==="innerHTML") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for (const c of children) {
    if (c==null||c===false) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
};
const div = (cls, ...ch) => el("div",{className:cls},...ch);
const span = (cls, txt) => el("span",{className:cls},txt);
const btn = (cls, txt, cb) => el("button",{className:"btn "+cls, onClick:cb},txt);
const tag = (cls, txt) => span("tag "+cls, txt);

function makeBar(val,min,max,h=6) {

  return track;
}

// ─── TAB: SEMAINE ─────────────────────────────────────────────────────────────
function renderSemaine() {
  const frag=document.createDocumentFragment();

  const daysWithMeals=daysWithData.filter(x=>x.day.repas.length>0);

  let avgMac=null;
  if (daysWithMeals.length>0) {
    avgMac=daysWithMeals.reduce((a,x)=>{const m=sumMacros(x.day.repas);return{cal:a.cal+m.cal,prot:a.prot+m.prot,gluc:a.gluc+m.gluc,lip:a.lip+m.lip};},{cal:0,prot:0,gluc:0,lip:0});
    ["cal","prot","gluc","lip"].forEach(k=>avgMac[k]=Math.round(avgMac[k]/daysWithMeals.length));
  }
  const daysWithSleep=daysWithData.filter(x=>x.day.sommeil?.coucher&&x.day.sommeil?.lever);
  const avgSleepMins=daysWithSleep.length>0?daysWithSleep.reduce((a,x)=>{const d=calcDuree(x.day.sommeil.coucher,x.day.sommeil.lever);return a+(d?d.total:0);},0)/daysWithSleep.length:null;
  const sleepC=avgSleepMins?(avgSleepMins>=450?"var(--green)":avgSleepMins>=360?"var(--amber)":"var(--danger)"):"var(--muted)";
  const totalKm=daysWithData.reduce((a,x)=>a+(Number(x.day.entrainement?.km)||0),0);
  const poidsWeek=daysWithData.filter(x=>x.day.poids).map(x=>({date:x.date,poids:parseFloat(x.day.poids)}));
  const deltaP=(poidsWeek.length>=2)?poidsWeek[poidsWeek.length-1].poids-poidsWeek[0].poids:null;
  const nbSeances=daysWithData.filter(x=>x.day.entrainement?.type).length;

  const card=el("div",{className:"card fade-in",style:{borderColor:"rgba(0,229,255,.2)"}});
  card.appendChild(el("div",{className:"slbl accent"},"Semaine du "+fmtDate(days7[0])+" → "+fmtDate(days7[6])));

  if (avgMac) {
    card.appendChild(el("div",{style:{fontSize:"9px",fontWeight:"700",color:"var(--subtle)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"8px",fontFamily:"'Barlow Condensed',sans-serif"}},"Macros moy. ("+daysWithMeals.length+" jours)"));
    const mb=el("div",{style:{background:"var(--surface2)",borderRadius:"10px",padding:"12px 14px",border:"1px solid var(--border)",marginBottom:"12px"}});
    const cr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}});
    cr.appendChild(el("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"36px",color:sColor(avgMac.cal,GOALS.calories.min,GOALS.calories.max),letterSpacing:"-1px"}},String(avgMac.cal)));
    cr.appendChild(el("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--subtle)"}},"2100–2200 kcal"));
    mb.appendChild(cr);
    const tgs=div("tags"); [["t-prot",avgMac.prot+"g P"],["t-gluc",avgMac.gluc+"g G"],["t-lip",avgMac.lip+"g L"]].forEach(([c,t])=>tgs.appendChild(tag(c,t)));
    mb.appendChild(tgs); card.appendChild(mb);
  }

  const sg=el("div",{className:"wk-stat-grid"});
  [{val:avgSleepMins?Math.floor(avgSleepMins/60)+"h"+(Math.round(avgSleepMins%60)>0?Math.round(avgSleepMins%60)+"m":""):"—",lbl:"Sommeil moy.",sub:daysWithSleep.length+" nuits",c:sleepC},
   {val:totalKm>0?totalKm.toFixed(1)+"km":"—",lbl:"Km marchés",sub:Math.round(totalKm*52)+" kcal nettes",c:totalKm>0?"var(--accent)":"var(--muted)"},
   {val:deltaP!==null?(deltaP<=0?"▼":"▲")+Math.abs(deltaP).toFixed(1):"—",lbl:"Évol. poids",sub:poidsWeek.length>=2?poidsWeek[0].poids+"→"+poidsWeek[poidsWeek.length-1].poids+" kg":"pas de données",c:deltaP!==null?(deltaP<=0?"var(--green)":"var(--danger)"):"var(--muted)"},
   {val:String(nbSeances),lbl:"Séances",sub:"sur 7 jours",c:nbSeances>0?"var(--amber)":"var(--muted)"}
  ].forEach(s=>{
    const b=div("wk-box");
    b.appendChild(el("div",{className:"wk-val",style:{color:s.c}},s.val));
    b.appendChild(el("div",{className:"wk-lbl"},s.lbl));
    b.appendChild(el("div",{className:"wk-sub"},s.sub));
    sg.appendChild(b);
  });
  card.appendChild(sg);
  frag.appendChild(card);

  frag.appendChild(el("div",{className:"slbl",style:{margin:"6px 0 10px"}},"Détail par jour"));
  [...daysWithData].reverse().forEach(({date:d,day:dy})=>{
    const m=sumMacros(dy.repas);
    const dur=calcDuree(dy.sommeil?.coucher,dy.sommeil?.lever);
    const sleepC2=dur?(dur.total>=450?"var(--green)":dur.total>=360?"var(--amber)":"var(--danger)"):"var(--muted)";
    const row=el("div",{className:"wk-day-row",onClick:()=>{state.date=d;state.tab="nutrition";render();}});
    const left=div(""); left.appendChild(el("div",{className:"wk-day-name"},fmtDate(d)+(d===todayStr()?" · Aujourd'hui":"")));
    const tgs=div("wk-day-tags");
    if(m.cal>0) tgs.appendChild(tag("t-kcal",m.cal+" kcal"));
    if(m.prot>0) tgs.appendChild(tag("t-prot",m.prot+"g P"));
    if(dur) tgs.appendChild(el("span",{className:"tag",style:{background:"rgba(213,128,255,.1)",color:sleepC2,border:`1px solid ${sleepC2}33`,fontSize:"10px"}},dur.h+"h"+(dur.m>0?dur.m+"m":"")));
    if(dy.entrainement?.type) tgs.appendChild(tag("t-kcal",dy.entrainement.type));
    if(dy.entrainement?.km) tgs.appendChild(tag("t-gluc",dy.entrainement.km+"km"));
    left.appendChild(tgs); row.appendChild(left);
    if(dy.poids) row.appendChild(el("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"20px",color:"var(--accent)",marginLeft:"10px"}},dy.poids,el("span",{style:{fontSize:"11px",color:"var(--muted)",fontFamily:"'Barlow Condensed',sans-serif"}},"kg")));
    frag.appendChild(row);
  });
  return frag;
}

    [["Calories",state.dbForm.cal,"cal","kcal"],["Protéines g",state.dbForm.prot,"prot",""],["Glucides g",state.dbForm.gluc,"gluc",""],["Lipides g",state.dbForm.lip,"lip",""],["Fibres g",state.dbForm.fib,"fib",""]].forEach(([l,v,k,ph])=>{
      tc.appendChild(makeInp(l,v,nv=>{state.dbForm[k]=nv;},"number",ph));

    fc.appendChild(tc);
    const r=el("div",{className:"btn-row"});
    r.appendChild(btn("btn-primary","✓ Enregistrer",()=>{
      if(!state.dbForm.nom.trim()) return;
      state.foodDb=[...state.foodDb,{id:"u_"+Date.now(),nom:state.dbForm.nom,cal:+state.dbForm.cal||0,prot:+state.dbForm.prot||0,gluc:+state.dbForm.gluc||0,lip:+state.dbForm.lip||0,fib:+state.dbForm.fib||0,ref:state.dbForm.ref}];

    }));
    r.appendChild(btn("btn-ghost","Annuler",()=>{state.showDbAdd=false;render();}));
    fc.appendChild(r); frag.appendChild(fc);
  }

  state.foodDb.forEach(f=>{
    if (state.editDbId===f.id) {
      const fc=el("div",{className:"form-card fade-in"});
      fc.appendChild(makeInp("Nom",state.dbForm.nom,v=>{state.dbForm.nom=v;}));
      fc.appendChild(makeInp("Référence",state.dbForm.ref,v=>{state.dbForm.ref=v;}));
      const tc=el("div",{className:"two-col"});
      [["Calories",state.dbForm.cal,"cal"],["Protéines g",state.dbForm.prot,"prot"],["Glucides g",state.dbForm.gluc,"gluc"],["Lipides g",state.dbForm.lip,"lip"],["Fibres g",state.dbForm.fib,"fib"]].forEach(([l,v,k])=>{
        tc.appendChild(makeInp(l,v,nv=>{state.dbForm[k]=nv;},"number"));
      });
      fc.appendChild(tc);
      const r=el("div",{className:"btn-row"});
      r.appendChild(btn("btn-primary","✓ Enregistrer",()=>{
        state.foodDb=state.foodDb.map(x=>x.id===f.id?{...x,nom:state.dbForm.nom,cal:+state.dbForm.cal||0,prot:+state.dbForm.prot||0,gluc:+state.dbForm.gluc||0,lip:+state.dbForm.lip||0,fib:+state.dbForm.fib||0,ref:state.dbForm.ref}:x);
        persistDb(); state.editDbId=null; render();
      }));
      r.appendChild(btn("btn-ghost","Annuler",()=>{state.editDbId=null;render();}));
      fc.appendChild(r); frag.appendChild(fc);
    } else {
      const item=div("db-item");
      const dh=div("db-hdr");
      const dl=div("");
      const dn=el("span",{className:"db-name"},f.nom);
      if(f.cal===0||f.gluc===0||f.lip===0) dl.appendChild(el("div",{},dn,el("span",{className:"incomplete"},"incomplet")));
      else dl.appendChild(dn);
      if(f.ref) dl.appendChild(el("div",{className:"db-ref"},f.ref));
      dh.appendChild(dl);
      const da=div(""); const editBtn=btn("btn-ghost btn-sm","✏",()=>{state.editDbId=f.id;state.dbForm={nom:f.nom,cal:String(f.cal),prot:String(f.prot),gluc:String(f.gluc),lip:String(f.lip),fib:String(f.fib||0),ref:f.ref||""};render();});
      const delBtn=btn("btn-danger btn-sm","✕",()=>{state.foodDb=state.foodDb.filter(x=>x.id!==f.id);persistDb();render();});
      dh.appendChild(el("div",{style:{display:"flex",gap:"6px"}},editBtn,delBtn));
      item.appendChild(dh);
      const tgs=div("tags");
      if(f.cal>0) tgs.appendChild(tag("t-kcal",f.cal+" kcal"));
      tgs.appendChild(tag("t-prot",f.prot+"g P"));
      if(f.gluc>0) tgs.appendChild(tag("t-gluc",f.gluc+"g G"));
      if(f.lip>0) tgs.appendChild(tag("t-lip",f.lip+"g L"));
      if(f.fib>0) tgs.appendChild(tag("t-fib",f.fib+"g F"));
      tgs.appendChild(el("span",{className:"tag",style:{background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border)"}},"/100g"));
      item.appendChild(tgs);
      frag.appendChild(item);
    }
  });
  return frag;
}

function render() {
  const day=getDay(state.date);
  const mac=sumMacros(day.repas);
  const calC=sColor(mac.cal,GOALS.calories.min,GOALS.calories.max);

  // Date picker
  document.getElementById("datePick").value=state.date;

  // Stats chips
  const sr=document.getElementById("statsRow");
  sr.innerHTML="";
  [{l:"POIDS",v:day.poids?day.poids+"kg":"—",c:"#a5b4fc"},{l:"KCAL",v:String(mac.cal||0),c:calC},{l:"PROT",v:(Math.round(mac.prot*10)/10||0)+"g",c:sColor(mac.prot,GOALS.proteines.min,GOALS.proteines.max)},{l:"SÉANCE",v:day.entrainement?.type||"—",c:"var(--amber)"}].forEach(s=>{
    const chip=div("chip");
    chip.appendChild(el("div",{className:"chip-lbl"},s.l));
    chip.appendChild(el("div",{className:"chip-val",style:{color:s.c}},s.v));
    sr.appendChild(chip);
  });

  // Tabs
  const tb=document.getElementById("tabBar");
  tb.innerHTML="";
  [{id:"recap",icon:"▲",lbl:"Récap"},{id:"nutrition",icon:"◈",lbl:"Nutri"},{id:"poids",icon:"○",lbl:"Poids"},{id:"training",icon:"◆",lbl:"Train"},{id:"sommeil",icon:"☾",lbl:"Sommeil"},{id:"semaine",icon:"◉",lbl:"Sem."},{id:"micros",icon:"⚡",lbl:"Micros"}].forEach(t=>{
    const b=el("button",{className:"tab"+(state.tab===t.id?" active":""),onClick:()=>{state.tab=t.id;render();}},t.icon+" "+t.lbl);
    tb.appendChild(b);
  });

  // Content
  const c=document.getElementById("content");
  c.innerHTML="";
  const tabMap={recap:renderRecap,nutrition:renderNutrition,poids:renderPoids,training:renderTraining,sommeil:renderSommeil,semaine:renderSemaine};
  if (tabMap[state.tab]) c.appendChild(tabMap[state.tab]());
  if (state.tab === 'micros') {
    const microWrap = document.createElement('div');
    microWrap.id = 'micro-module-wrap';
    microWrap.innerHTML = MICRO_HTML;
    c.appendChild(microWrap);
    microInit();
  }
}

}

function loadDeficitStreaks() {
  try { return JSON.parse(localStorage.getItem('micro_deficits') || '{}'); } catch { return {}; }
}
function saveDeficitStreaks(s) {
  try { localStorage.setItem('micro_deficits', JSON.stringify(s)); } catch {}
}
function updateDeficitStreaks(totals) {
  const streaks = loadDeficitStreaks();
  const todayFr = new Date().toLocaleDateString('fr-FR');
  Object.keys(AJR).forEach(function(key) {
    const pct = (totals[key] / AJR[key].val) * 100;
    if (pct < 60) {
      if (!streaks[key]) streaks[key] = { streak: 1, firstDate: todayFr, lastDate: todayFr };
      else if (streaks[key].lastDate !== todayFr) { streaks[key].streak++; streaks[key].lastDate = todayFr; }
    } else { if (streaks[key]) delete streaks[key]; }
  });
  saveDeficitStreaks(streaks);
  return streaks;
}
function getStreakUrgency(key, days) {
  const tl = DEFICIT_TIMELINE[key];
  if (!tl || days === 0) return 'none';
  const r = days / tl.days;
  return r >= 1 ? 'critical' : r >= 0.6 ? 'high' : r >= 0.3 ? 'medium' : 'low';
}

function matchMicroName(nom) {
  const lower = nom.toLowerCase().replace(/\s*\d+\s*g?\s*$/, '').trim();
  if (MICRO_NAME_MAP[lower]) return MICRO_NAME_MAP[lower];
  for (const key of Object.keys(MICRO_NAME_MAP)) {
    if (lower.includes(key) || key.includes(lower)) return MICRO_NAME_MAP[key];
  }
  return null;
}
function syncToMicro(foodName, qty, repasType) {
  try {
    const microName = matchMicroName(foodName);
    if (!microName) return false;
    const todayFr = new Date().toLocaleDateString('fr-FR');
    let log = [];
    if (localStorage.getItem('micro_last_day') === todayFr) {
      try { log = JSON.parse(localStorage.getItem('micro_today') || '[]'); } catch {}
    }
    log.push({ food: microName, qty: qty, meal: REPAS_TYPE_MAP2[repasType] || 'diner', prep: null });
    localStorage.setItem('micro_today', JSON.stringify(log));
    localStorage.setItem('micro_last_day', todayFr);
    return true;
  } catch(e) { return false; }
}
function removeMicroEntry(foodName, qty, repasType) {
  try {
    const microName = matchMicroName(foodName);
    if (!microName) return;
    let log = [];
    try { log = JSON.parse(localStorage.getItem('micro_today') || '[]'); } catch {}
    const mk = REPAS_TYPE_MAP2[repasType] || 'diner';
    const idx2 = log.map(function(e,i){ return (e.food===microName&&e.meal===mk)?i:-1; }).filter(function(i){return i>=0;});
    if (idx2.length) { log.splice(idx2[idx2.length-1],1); localStorage.setItem('micro_today', JSON.stringify(log)); }
  } catch {}
}

function microLoadState() {

  if (lastDay && lastDay !== today) {

    const yestQuality = computeQualityScore(yestScore, yestInflam, yestSatiety, yestProtEff, yestDiversite);
    updateDeficitStreaks(yestTotals);
    microHistory.unshift({ date: lastDay, totals: yestTotals, score: yestScore, inflam: yestInflam, satiety: yestSatiety, protEff: yestProtEff, diversite: yestDiversite, quality: yestQuality, foods: todayLog.length });

function computeTotals(log) {
  const totals = {};
  Object.keys(AJR).forEach(k => totals[k] = 0);
  log.forEach(entry => {
    const food = FOODS_DB[entry.food];
    if (!food) return;
    const ratio = entry.qty / 100;
    Object.keys(food.micros).forEach(k => {
      if (totals[k] !== undefined) totals[k] += food.micros[k] * ratio;
    });
  });
  return totals;
}

function computeScore(totals) {
  const keys = Object.keys(AJR);
  let total = 0;
  keys.forEach(k => {
    const pct = Math.min((totals[k] / AJR[k].val) * 100, 100);
    total += pct;
  });
  return Math.round(total / keys.length);
}

function getStatus(pct) {
  if (pct >= 80) return 'ok';
  if (pct >= 50) return 'warn';
  return 'low';
}

function getStatusLabel(pct) {
  if (pct >= 100) return 'Atteint ✓';
  if (pct >= 80) return 'Bon';
  if (pct >= 50) return 'Insuffisant';
  return 'Carence';
}

// ─── COMPUTE HELPERS ─────────────────────────────────────────────────────────
function computeInflamScore(log) {
  let total = 0;
  log.forEach(function(item) {
    total += ((INFLAM_SCORE[item.food] || 0) * item.qty) / 100;
  });
  return Math.round(total);
}

function computeSatietyScore(log) {
  let totalSat = 0, totalKcal = 0;
  log.forEach(function(item) {
    const kcal = ((KCAL_PER_100[item.food] || 150) * item.qty) / 100;
    totalSat += (SATIETY[item.food] || 60) * kcal;
    totalKcal += kcal;
  });
  return totalKcal > 0 ? Math.round(totalSat / totalKcal) : 0;
}

function computeEffectiveProtein(log) {
  let total = 0;
  log.forEach(function(item) {
    total += getEffectiveProtein(item.food, item.qty, item.prep);
  });
  return Math.round(total);
}

function computeDiversiteScore(log) {
  const foodsEaten = new Set(log.map(function(e) { return e.food; }));
  let covered = 0;
  Object.keys(FOOD_CATEGORIES).forEach(function(cat) {
    if (FOOD_CATEGORIES[cat].some(function(f) { return foodsEaten.has(f); })) covered++;
  });
  return Math.round((covered / Object.keys(FOOD_CATEGORIES).length) * 100);
}

function computeQualityScore(microScore, inflam, satiety, protEff, diversite) {
  // microScore 0-100 (30%)
  // inflam: negative is good. Map -100 to +50 -> 0-100 (20%)
  const inflam100 = Math.max(0, Math.min(100, Math.round(((inflam * -1) + 50) / 1.5)));
  // satiety 0-100 (20%)
  // protEff: target 160g = 100. Scale (15%)
  const prot100 = Math.min(100, Math.round((protEff / 160) * 100));
  // diversite 0-100 (15%)
  return Math.round(
    microScore * 0.30 +
    inflam100 * 0.20 +
    satiety * 0.20 +
    prot100 * 0.15 +
    diversite * 0.15
  );
}

// ─── RENDER PATTERNS ─────────────────────────────────────────────────────────
function renderPatterns() {
  const container = document.getElementById('mc-patternsContent');
  if (!container) return;

  // Need today + microHistory combined for analysis
  const totals = computeTotals(todayLog);
  const todayData = {
    date: new Date().toLocaleDateString('fr-FR'),
    score: computeScore(totals),
    inflam: computeInflamScore(todayLog),
    satiety: computeSatietyScore(todayLog),
    protEff: computeEffectiveProtein(todayLog),
    diversite: computeDiversiteScore(todayLog),
    quality: computeQualityScore(computeScore(totals), computeInflamScore(todayLog), computeSatietyScore(todayLog), computeEffectiveProtein(todayLog), computeDiversiteScore(todayLog)),
    foods: todayLog.length,
  };

  const allDays = todayLog.length > 0 ? [todayData].concat(microHistory) : microHistory;

  if (allDays.length < 3) {
    container.innerHTML = '<div class="card"><div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">' +
      'Il faut au moins 3 jours de données pour détecter des patterns.<br><br>' +
      '<span style="color:var(--cyan);font-weight:700;">Jours enregistrés : ' + allDays.length + '/3</span>' +
    '</div></div>';
    return;
  }

  const patterns = [];

  // Pattern 1: Consistency of protein intake
  const protScores = allDays.map(function(d) { return d.protEff || 0; });
  const avgProt = protScores.reduce(function(a,b){return a+b;},0) / protScores.length;
  const protVariance = protScores.map(function(p) { return Math.abs(p - avgProt); });
  const avgVariance = protVariance.reduce(function(a,b){return a+b;},0) / protVariance.length;
  if (avgProt < 130) {
    patterns.push({ type: 'danger', icon: '⛔', title: 'Déficit protéique chronique', desc: 'Moyenne ' + Math.round(avgProt) + 'g/j de protéines effectifs sur ' + allDays.length + ' jours. Cible : 160g. La synthèse protéique et la préservation musculaire sont compromises.', action: 'Ajoute whey, filet de poulet ou thon à chaque repas.' });
  } else if (avgVariance > 30) {
    patterns.push({ type: 'warning', icon: '⚠️', title: 'Apport protéique irrégulier', desc: 'Tes protéines varient de ±' + Math.round(avgVariance) + 'g/j. La synthèse protéique est optimale quand l\'apport est stable.', action: 'Vise ' + Math.round(avgProt) + 'g de protéines chaque jour sans exception.' });
  } else {
    patterns.push({ type: 'ok', icon: '✅', title: 'Apport protéique régulier', desc: 'Moyenne ' + Math.round(avgProt) + 'g/j, variation ±' + Math.round(avgVariance) + 'g. Cohérent et suffisant.', action: null });
  }

  // Pattern 2: Inflammatory trend
  const inflams = allDays.map(function(d) { return d.inflam || 0; });
  const avgInflam = inflams.reduce(function(a,b){return a+b;},0) / inflams.length;
  const highInflamDays = inflams.filter(function(i) { return i > 20; }).length;
  if (highInflamDays >= 2) {
    patterns.push({ type: 'danger', icon: '🔥', title: 'Inflammation chronique détectée', desc: highInflamDays + ' jour(s) sur ' + allDays.length + ' avec score pro-inflammatoire élevé (>20). Récupération ralentie, cortisol élevé, risque de perte musculaire accrue en cut.', action: 'Intègre saumon, sardines, myrtilles ou chia quotidiennement.' });
  } else if (avgInflam < -30) {
    patterns.push({ type: 'ok', icon: '✅', title: 'Bonne charge anti-inflammatoire', desc: 'Score moyen : ' + Math.round(avgInflam) + ' sur ' + allDays.length + ' jours. Récupération favorisée.', action: null });
  } else {
    patterns.push({ type: 'warning', icon: '⚠️', title: 'Charge anti-inflammatoire insuffisante', desc: 'Score moyen : ' + Math.round(avgInflam) + '. Vise < -30 chaque jour.', action: 'Ajoute 1 poisson gras ou une poignée de fruits rouges chaque jour.' });
  }

  // Pattern 3: Satiety vs diversite correlation
  const lowSatDays = allDays.filter(function(d) { return (d.satiety || 0) < 55; });
  if (lowSatDays.length >= 2) {
    patterns.push({ type: 'warning', icon: '🍽', title: 'Satiété faible récurrente', desc: lowSatDays.length + ' jour(s) avec satiété < 55/100. En cut, une alimentation peu rassasiante favorise les écarts et le surmenage hormonal.', action: 'Privilégie filet de poulet, brocoli, fromage blanc — densité protéique maximale pour peu de calories.' });
  }

  // Pattern 4: Micronutrient consistency
  const microScores = allDays.map(function(d) { return d.score || 0; });
  const avgMicro = microScores.reduce(function(a,b){return a+b;},0) / microScores.length;
  const lowMicroDays = microScores.filter(function(s) { return s < 50; }).length;
  if (lowMicroDays >= 2) {
    patterns.push({ type: 'danger', icon: '⛔', title: 'Carence micronutriments récurrente', desc: lowMicroDays + ' jour(s) avec score micro < 50/100. En cut prolongé, un déficit micronutriments chronique ralentit le métabolisme et favorise la perte musculaire.', action: 'Intègre épinards, sardines ou pollen chaque jour — forte densité micro pour peu de calories.' });
  } else if (avgMicro >= 70) {
    patterns.push({ type: 'ok', icon: '✅', title: 'Micronutriments bien couverts', desc: 'Score moyen ' + Math.round(avgMicro) + '/100 sur ' + allDays.length + ' jours. Continue.', action: null });
  }

  // Pattern 5: Diversity trend
  const divScores = allDays.map(function(d) { return d.diversite || 0; });
  const avgDiv = divScores.reduce(function(a,b){return a+b;},0) / divScores.length;
  if (avgDiv < 40) {
    patterns.push({ type: 'warning', icon: '🔁', title: 'Alimentation répétitive', desc: 'Score diversité moyen : ' + Math.round(avgDiv) + '%. Tu consommes probablement les mêmes 6-8 aliments chaque jour. Tu plafonnes sur certains micros quoi que tu fasses.', action: 'Introduis 1 nouvel aliment par semaine. Essaie lentilles, sardines ou baies de goji.' });
  }

  // Pattern 6: Quality trend (improving or declining?)
  if (allDays.length >= 4) {
    const recent = allDays.slice(0, 2).map(function(d){return d.quality||0;});
    const older = allDays.slice(2).map(function(d){return d.quality||0;});
    const recentAvg = recent.reduce(function(a,b){return a+b;},0)/recent.length;
    const olderAvg = older.reduce(function(a,b){return a+b;},0)/older.length;
    const diff = Math.round(recentAvg - olderAvg);
    if (diff >= 8) {
      patterns.push({ type: 'ok', icon: '📈', title: 'Progression détectée', desc: 'Score qualité en hausse de +' + diff + ' pts sur les derniers jours. Ta routine s\'améliore.', action: null });
    } else if (diff <= -8) {
      patterns.push({ type: 'warning', icon: '📉', title: 'Dégradation détectée', desc: 'Score qualité en baisse de ' + diff + ' pts sur les derniers jours. Identifie ce qui a changé.', action: 'Compare tes journées récentes aux meilleures dans l\'historique.' });
    }
  }

  if (patterns.length === 0) {
    container.innerHTML = '<div class="card"><div style="color:var(--green);font-size:0.88rem;text-align:center;padding:16px 0;">✅ Aucun pattern négatif détecté. Continue comme ça.</div></div>';
    return;
  }

  // Render timeline chart for quality
  const chartHtml = renderPatternChart(allDays);

  let html = chartHtml;
  html += '<div class="section-title" style="margin-top:16px;">Patterns détectés (' + patterns.length + ')</div>';
  patterns.forEach(function(p) {
    const bgColor = p.type === 'ok' ? 'rgba(105,255,71,0.06)' : p.type === 'warning' ? 'rgba(255,214,0,0.08)' : 'rgba(255,64,129,0.1)';
    const borderColor = p.type === 'ok' ? 'rgba(105,255,71,0.25)' : p.type === 'warning' ? 'rgba(255,214,0,0.3)' : 'rgba(255,64,129,0.4)';
    const textColor = p.type === 'ok' ? 'var(--green)' : p.type === 'warning' ? 'var(--amber)' : 'var(--pink)';
    html += '<div style="background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:8px;padding:12px 14px;margin-bottom:8px;">' +
      '<div style="display:flex;gap:10px;align-items:flex-start;">' +
        '<span style="font-size:1.1rem;">' + p.icon + '</span>' +
        '<div style="flex:1;">' +
          '<div style="font-weight:700;color:' + textColor + ';margin-bottom:4px;">' + p.title + '</div>' +
          '<div style="font-size:0.83rem;color:var(--text);line-height:1.4;margin-bottom:' + (p.action ? '6px' : '0') + ';">' + p.desc + '</div>' +
          (p.action ? '<div style="font-size:0.8rem;color:var(--cyan);font-weight:700;">→ ' + p.action + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  });

  container.innerHTML = html;
}

function renderPatternChart(days) {
  if (days.length < 2) return '';
  const reversed = days.slice().reverse();
  const maxQ = 100;
  const chartH = 80;
  const chartW = 280;
  const pts = reversed.map(function(d, i) {
    const x = (i / (reversed.length - 1)) * chartW;
    const y = chartH - ((d.quality || 0) / maxQ) * chartH;
    return x + ',' + y;
  });

  const labels = reversed.map(function(d) {
    return d.date.split('/').slice(0,2).join('/');
  });

  let html = '<div class="card" style="padding:14px;">' +
    '<div style="font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Score qualité — ' + days.length + ' derniers jours</div>' +
    '<svg viewBox="0 0 ' + chartW + ' ' + chartH + '" style="width:100%;height:' + chartH + 'px;overflow:visible;">' +
      '<polyline points="' + pts.join(' ') + '" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>';

  reversed.forEach(function(d, i) {
    const x = (i / (reversed.length - 1)) * chartW;
    const y = chartH - ((d.quality || 0) / maxQ) * chartH;
    const c = (d.quality||0) >= 75 ? '#69ff47' : (d.quality||0) >= 55 ? '#ffd600' : '#ff4081';
    html += '<circle cx="' + x + '" cy="' + y + '" r="4" fill="' + c + '"/>';
    html += '<text x="' + x + '" y="' + (y - 8) + '" text-anchor="middle" fill="' + c + '" font-size="10" font-family="Barlow Condensed">' + (d.quality||0) + '</text>';
  });

  html += '</svg>' +
    '<div style="display:flex;justify-content:space-between;margin-top:4px;">' +
    labels.map(function(l) {
      return '<span style="font-size:0.65rem;color:var(--muted);">' + l + '</span>';
    }).join('') +
    '</div>' +
  '</div>';
  return html;
}

function renderProtAbsorption() {
  const card = document.getElementById('mc-protAbsCard');
  if (!card || todayLog.length === 0) return;

  let totalRaw = 0;
  let totalEff = 0;
  const details = [];

  todayLog.forEach(function(item) {
    const protPer100 = PROTEIN_CONTENT[item.food] || 0;
    const raw = (protPer100 * item.qty) / 100;
    const eff = getEffectiveProtein(item.food, item.qty, item.prep);
    const abs = getEffectiveAbsorption(item.food, item.prep);
    if (raw > 0.5) {
      details.push({ food: item.food, raw: raw, eff: eff, abs: abs });
    }
    totalRaw += raw;
    totalEff += eff;
  });

  details.sort(function(a,b) { return b.raw - a.raw; });

  const globalAbs = totalRaw > 0 ? Math.round((totalEff / totalRaw) * 100) : 0;
  const absColor = globalAbs >= 88 ? 'var(--green)' : globalAbs >= 75 ? 'var(--amber)' : 'var(--pink)';

  let html = '<div style="display:flex;gap:10px;margin-bottom:14px;">' +
    '<div class="summary-card" style="flex:1;"><div class="val cyan">' + totalRaw.toFixed(1) + 'g</div><div class="lbl">Protéines brutes</div></div>' +
    '<div class="summary-card" style="flex:1;"><div class="val" style="color:' + absColor + ';">' + totalEff.toFixed(1) + 'g</div><div class="lbl">Prot. effectifs</div></div>' +
    '<div class="summary-card" style="flex:1;"><div class="val" style="color:' + absColor + ';">' + globalAbs + '%</div><div class="lbl">Absorption moy.</div></div>' +
  '</div>';

  if (details.length > 0) {
    html += '<div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Détail par aliment</div>';
    details.forEach(function(d) {
      const c = d.abs >= 88 ? 'var(--green)' : d.abs >= 70 ? 'var(--amber)' : 'var(--pink)';
      const lostG = (d.raw - d.eff).toFixed(1);
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);">' +
        '<span style="font-size:0.82rem;flex:1;">' + d.food + '</span>' +
        '<span style="font-size:0.8rem;color:' + c + ';font-weight:700;margin-left:8px;">' + d.abs + '%</span>' +
        '<span style="font-size:0.8rem;color:var(--muted);margin-left:8px;">' + d.raw.toFixed(1) + 'g → ' + d.eff.toFixed(1) + 'g</span>' +
      '</div>';
    });
  }

  card.innerHTML = html;
}

function microRender() {
  const totals = computeTotals(todayLog);
  renderBilan(totals);
  renderRatio(totals);
  renderDiversite();
  renderProtAbsorption();
  renderSatiety();
  renderInflam();
  renderTiming();
  renderQuality();
  renderPatterns();
  renderMealLog();
  renderAlertes(totals);
  renderConseils(totals);
  renderHistorique();
}

function renderBilan(totals) {
  const score = todayLog.length > 0 ? computeScore(totals) : null;

  // Score circle
  const circle = document.getElementById('mc-scoreCircle');
  const num = document.getElementById('mc-scoreNum');
  const text = document.getElementById('mc-scoreText');

  if (score === null) {
    num.textContent = '—';
    circle.className = 'score-circle';
    text.textContent = 'Ajoute tes repas pour calculer ton score micronutriments.';
  } else {
    num.textContent = score;
    num.style.color = score >= 70 ? 'var(--green)' : score >= 50 ? 'var(--amber)' : 'var(--pink)';
    circle.className = 'score-circle ' + (score >= 70 ? 'high' : score >= 50 ? 'medium' : 'low');
    text.textContent = score >= 70 ? 'Bonne couverture micronutriments. Continue.' : score >= 50 ? 'Quelques points à améliorer. Voir les alertes.' : 'Couverture insuffisante. Action requise.';
  }

  // Bars
  const container = document.getElementById('mc-microBars');
  if (todayLog.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Aucun aliment enregistré aujourd\'hui.</div>';
    return;
  }

  container.innerHTML = Object.keys(AJR).map(key => {
    const val = totals[key];
    const ajr = AJR[key];
    const pct = Math.min((val / ajr.val) * 100, 130);
    const displayPct = Math.min(pct, 100);
    const status = pct >= 130 ? 'over' : getStatus(pct);
    const label = pct >= 100 ? 'over' : status;

    return `
      <div class="micro-item">
        <div class="micro-header">
          <span class="micro-name">${key}</span>
          <span class="micro-values"><span>${val.toFixed(1)}</span> / ${ajr.val} ${ajr.unit}</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill ${label}" style="width:${displayPct}%"></div>
        </div>
        <div class="micro-pct ${label}">${Math.round(pct)}% — ${getStatusLabel(pct)}</div>
      </div>
    `;
  }).join('');

  // Summary
  let ok = 0, low = 0, warn = 0;
  Object.keys(AJR).forEach(k => {
    const pct = (totals[k] / AJR[k].val) * 100;
    if (pct >= 80) ok++;
    else if (pct >= 50) warn++;
    else low++;
  });

  document.getElementById('mc-sumOk').textContent = ok;
  document.getElementById('mc-sumLow').textContent = low;
  document.getElementById('mc-sumWarn').textContent = warn;
  document.getElementById('mc-sumAliments').textContent = todayLog.length;
}

function renderMealLog() {
  const meals = { 'petit-dej': 'Petit-déjeuner', 'dejeuner': 'Déjeuner', 'gouter': 'Goûter', 'diner': 'Dîner' };
  let html = '';

  Object.keys(meals).forEach(mealKey => {
    const items = todayLog.filter(e => e.meal === mealKey);
    if (items.length === 0) return;

    html += `<div class="meal-section">
      <div class="meal-label">${meals[mealKey]}</div>`;

      items.forEach((item, idx) => {
        const globalIdx = todayLog.indexOf(item);
        const showAbs = PREP_FOODS.has(item.food);
        const absRate = showAbs ? getEffectiveAbsorption(item.food, item.prep) : (BASE_ABSORPTION[item.food] || 85);
        const effProt = getEffectiveProtein(item.food, item.qty, item.prep).toFixed(1);
        const absColor = absRate >= 85 ? 'var(--green)' : absRate >= 70 ? 'var(--amber)' : 'var(--pink)';
        const prepLabel = item.prep && item.prep !== 'seul' ? ' · ' + PREP_LABELS[item.prep] : '';
        html += '<div class="food-item">' +
          '<div style="flex:1;">' +
            '<div class="food-name">' + item.food + (prepLabel ? '<span style="font-size:0.7rem;color:var(--muted);font-weight:400;"> ' + prepLabel + '</span>' : '') + '</div>' +
            '<div style="font-size:0.75rem;margin-top:2px;color:' + absColor + ';">' + absRate + '% abs. · ' + effProt + 'g prot. effectifs</div>' +
          '</div>' +
          '<span class="food-qty">' + item.qty + 'g</span>' +
          '<button class="btn-remove" onclick="removeFood(' + globalIdx + ')">✕</button>' +
        '</div>';
      });

    html += '</div>';
  });

  document.getElementById('mc-mealLog').innerHTML = html || '<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Aucun aliment ajouté.</div>';
}

function renderAlertes(totals) {
  if (todayLog.length === 0) return;

  const low = [], warn = [], ok = [];

  Object.keys(AJR).forEach(k => {
    const pct = (totals[k] / AJR[k].val) * 100;
    const item = { name: k, pct: Math.round(pct), note: AJR[k].note };
    if (pct < 50) low.push(item);
    else if (pct < 80) warn.push(item);
    else ok.push(item);
  });

  let html = '';

  if (low.length > 0) {
    html += `<div class="section-title" style="margin-top:0">⛔ Carences (< 50%)</div>`;
    low.forEach(item => {
      html += `<div class="alert-box danger">
        <div class="alert-icon">⛔</div>
        <div class="alert-content">
          <strong>${item.name} — ${item.pct}% des AJR</strong>
          ${item.note}
        </div>
      </div>`;
    });
  }

  if (warn.length > 0) {
    html += `<div class="section-title">⚠️ À surveiller (50–80%)</div>`;
    warn.forEach(item => {
      html += `<div class="alert-box warning">
        <div class="alert-icon">⚠️</div>
        <div class="alert-content">
          <strong>${item.name} — ${item.pct}% des AJR</strong>
          ${item.note}
        </div>
      </div>`;
    });
  }

  if (ok.length > 0) {
    html += `<div class="section-title">✅ Objectifs atteints (> 80%)</div>`;
    ok.forEach(item => {
      html += `<div class="alert-box ok">
        <div class="alert-icon">✅</div>
        <div class="alert-content">
          <strong>${item.name} — ${item.pct}%</strong>
        </div>
      </div>`;
    });
  }

  if (html) {
    document.getElementById('mc-alertesContent').innerHTML = html + '<div class="disclaimer">⚠️ Ce module détecte les <strong>apports insuffisants</strong>, pas les carences biologiques réelles. Une prise de sang reste indispensable pour confirmer (vitamine D, fer, B12 notamment).</div>';
  }
}

function renderConseils(totals) {
  if (todayLog.length === 0) return;

  const deficits = Object.keys(AJR).filter(k => (totals[k] / AJR[k].val) * 100 < 80);

  const foodSuggestions = {};
  deficits.forEach(micro => {
    Object.keys(FOODS_DB).forEach(food => {
      if (FOODS_DB[food].micros[micro]) {
        const contribution = (FOODS_DB[food].micros[micro] / AJR[micro].val) * 100;
        if (contribution > 5) {
          if (!foodSuggestions[food]) foodSuggestions[food] = [];
          foodSuggestions[food].push({ micro, contribution: Math.round(contribution) });
        }
      }
    });
  });

  if (Object.keys(foodSuggestions).length === 0) {
    document.getElementById('mc-conseilsContent').innerHTML = '<div style="color:var(--green);font-size:0.88rem;text-align:center;padding:16px 0;">✅ Excellente couverture ! Pas de carence détectée.</div>';
    return;
  }

  const sorted = Object.entries(foodSuggestions)
    .sort((a, b) => b[1].length - a[1].length)
    .slice(0, 6);

  document.getElementById('mc-conseilsContent').innerHTML = sorted.map(([food, micros]) => `
    <div class="conseil-item">
      <div class="conseil-emoji">🍽</div>
      <div class="conseil-text">
        <strong>${food}</strong>
        Apporte : ${micros.map(m => `${m.micro} (+${m.contribution}% AJR/100g)`).join(', ')}
      </div>
    </div>
  `).join('');
}

function renderHistorique() {
  if (microHistory.length === 0) return;

  const microKeys = Object.keys(AJR).slice(0, 5); // Top 5 pour l'historique

  document.getElementById('mc-historiqueContent').innerHTML = microHistory.map(day => {
    const score = day.score;
    const badgeClass = score >= 70 ? 'green' : score >= 50 ? 'yellow' : 'pink';

    return `
      <div class="microHistory-day">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div class="microHistory-date">${day.date}</div>
          <span class="badge ${badgeClass}">Score: ${score}</span>
        </div>
        <div class="microHistory-bars">
          ${microKeys.map(k => {
            const pct = Math.min((day.totals[k] / AJR[k].val) * 100, 100);
            const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--pink)';
            return `
              <div class="microHistory-bar-row">
                <div class="microHistory-bar-label">${k}</div>
                <div class="microHistory-bar-mini">
                  <div class="microHistory-bar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function showMicroPage(id) {
  document.querySelectorAll('.mc-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('mc-page-' + id).classList.add('active');
  event.target.classList.add('active');
}

function setMeal(meal, btn) {
  currentMeal = meal;
  document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updatePrepVisibility() {
  const select = document.getElementById('mc-foodSelect');
  const prepRow = document.getElementById('mc-prepRow');
  const preview = document.getElementById('mc-absorptionPreview');
  const qtyEl = document.getElementById('mc-foodQty');
  const food = select.value;
  if (food && PREP_FOODS.has(food)) {
    prepRow.style.display = 'flex';
    const prepMode = document.getElementById('mc-prepMode').value;
    const qty = parseFloat(qtyEl.value) || 100;
    const abs = getEffectiveAbsorption(food, prepMode);
    const effProt = getEffectiveProtein(food, qty, prepMode).toFixed(1);
    const base = BASE_ABSORPTION[food];
    const color = abs >= 85 ? 'var(--green)' : abs >= 70 ? 'var(--amber)' : 'var(--pink)';
    preview.style.display = 'flex';
    preview.innerHTML = '<div style="font-size:0.82rem;padding:4px 0;color:' + color + ';font-weight:700;">' +
      'Absorption : ' + abs + '% (base ' + base + '%) → ' + effProt + 'g protéines effectifs</div>';
  } else {
    prepRow.style.display = 'none';
    preview.style.display = 'none';
  }
}

function addFood() {
  const select = document.getElementById('mc-foodSelect');
  const qty = parseFloat(document.getElementById('mc-foodQty').value);
  if (!select.value || !qty || qty <= 0) return;
  const prepMode = PREP_FOODS.has(select.value)
    ? document.getElementById('mc-prepMode').value
    : null;

  todayLog.push({ food: select.value, qty, meal: currentMeal, prep: prepMode });
  localStorage.setItem('micro_today', JSON.stringify(todayLog));
  select.value = '';
  document.getElementById('mc-foodQty').value = '100';
  document.getElementById('mc-prepRow').style.display = 'none';
  document.getElementById('mc-absorptionPreview').style.display = 'none';
  microRender();
}

function removeFood(idx) {
  todayLog.splice(idx, 1);
  localStorage.setItem('micro_today', JSON.stringify(todayLog));
  microRender();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function microInit() {
  if (!microInitialized) {
    microLoadState();
    microInitialized = true;
  }
  // Set date
  const dateStr = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  const hd = document.getElementById('mc-headerDate');
  if (hd) hd.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

  // Populate food select
  const sel = document.getElementById('mc-foodSelect');
  if (sel && sel.options.length <= 1) {
    Object.keys(FOODS_DB).sort().forEach(food => {
      const opt = document.createElement('option');
      opt.value = food;
      opt.textContent = food;
      sel.appendChild(opt);
    });
  }

  microRender();
}



// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
loadDb();
state.date=todayStr();

document.getElementById("datePick").addEventListener("change",e=>{
  state.date=e.target.value; render();
});

render();
</script>
