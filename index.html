<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Mon Suivi</title>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Mon Suivi"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#000000;
  --bg2:#0a0a0a;
  --surface:#1c1c1e;
  --surface2:#2c2c2e;
  --surface3:#3a3a3c;
  --border:#38383a;
  --text:#ffffff;
  --text2:#ebebf5cc;
  --muted:#8e8e93;
  --accent:#c8f135;
  --accent2:#a8d420;
  --blue:#0a84ff;
  --green:#30d158;
  --amber:#ffd60a;
  --danger:#ff453a;
  --pink:#ff375f;
  --purple:#bf5af2;
  --orange:#ff9f0a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(90px + env(safe-area-inset-bottom))}

/* HEADER */
.header{background:rgba(0,0,0,0.9);padding:calc(env(safe-area-inset-top,20px) + 16px) 20px 0;position:sticky;top:0;z-index:99;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.brand-wrap{}
.brand-lbl{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.brand-title{font-size:34px;font-weight:900;color:var(--text);text-transform:uppercase;line-height:1;letter-spacing:-1.5px}
.date-pick{background:var(--surface);border:none;color:var(--text2);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;font-weight:600;outline:none}

/* TABS */
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #1a1a1a;z-index:999;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;padding:4px 2px;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}
.tab-lbl{font-size:9px;font-weight:600;letter-spacing:0.3px}

/* CONTENT */
.content{padding:16px 16px 0}

/* CARDS */
.card{background:var(--surface);border-radius:20px;padding:20px;margin-bottom:12px;overflow:hidden}
.card-dark{background:var(--bg2);border-radius:20px;padding:20px;margin-bottom:12px;border:1px solid var(--border)}

/* BILAN */
.bilan-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.bilan-date{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}
.bilan-kcal{font-size:72px;font-weight:900;line-height:1;letter-spacing:-3px}
.bilan-goal{font-size:12px;color:var(--muted);margin-top:4px}
.bar-track{height:4px;border-radius:99px;background:var(--surface3);overflow:hidden;margin-bottom:16px}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.macro-cell{background:var(--surface2);border-radius:14px;padding:12px 8px;text-align:center}
.macro-val{font-size:20px;font-weight:800;line-height:1;margin-bottom:2px}
.macro-unit{font-size:9px;color:var(--muted);font-weight:500}
.macro-name{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.macro-bar{height:3px;border-radius:99px;background:var(--surface3);margin-top:6px;overflow:hidden}

/* SECTION */
.sec-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:14px}
.sec-sub{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}

/* REPAS TYPE BAR */
.rtype-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mode-bar{display:flex;gap:6px;margin-bottom:12px}

/* REPAS GROUP */
.rgroup{margin-bottom:16px}
.rgroup-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rgroup-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.rgroup-line{flex:1;height:1px;background:var(--border)}
.rgroup-sum{font-size:11px;color:var(--muted);font-weight:600}

/* FOOD ROW */
.food-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.food-name{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.t-kcal{background:rgba(255,214,0,.12);color:var(--amber)}
.t-prot{background:rgba(255,55,95,.12);color:var(--pink)}
.t-gluc{background:rgba(10,132,255,.12);color:var(--blue)}
.t-lip{background:rgba(255,159,10,.12);color:var(--orange)}
.t-fib{background:rgba(48,209,88,.12);color:var(--green)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:2px 8px;line-height:1}

/* FORM */
.form-card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:10px}
.inp-wrap{margin-bottom:10px}
.inp-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
input[type=text],input[type=number],input[type=time],textarea,select{width:100%;padding:13px 16px;background:var(--surface2);border:none;border-radius:12px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;font-weight:500;outline:none;transition:all .2s}
input:focus,textarea:focus,select:focus{background:var(--surface3)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* BUTTONS */
.btn{padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s;letter-spacing:0.3px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-ghost{background:var(--surface2);color:var(--text2)}
.btn-green{background:var(--accent);color:#000;font-weight:800}
.btn-amber{background:var(--amber);color:#000;font-weight:800}
.btn-danger{background:rgba(255,69,58,.15);color:var(--danger)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;margin-bottom:10px}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border-radius:14px;z-index:100;max-height:220px;overflow-y:auto;margin-top:4px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.ac-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:rgba(200,241,53,.08)}
.ac-name{font-size:14px;font-weight:700;text-transform:uppercase}
.ac-ref{font-size:10px;color:var(--muted);margin-top:2px}
.ac-meta{font-size:11px;color:var(--muted);font-weight:600}
.portion-row{display:flex;align-items:center;gap:12px;background:rgba(200,241,53,.06);border:1px solid rgba(200,241,53,.15);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.portion-lbl{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;flex:1}
.portion-in{width:80px!important;font-size:22px!important;font-weight:800!important;text-align:center!important;padding:8px!important}
.macro-prev{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}

/* POIDS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.prog-stat{text-align:center}
.prog-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.prog-val{font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px}
.prog-val-sm{font-size:24px;font-weight:800;line-height:1}
.delta{text-align:center;margin-top:12px;font-size:14px;font-weight:800;letter-spacing:1px}
.hist-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.hist-date{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:3px}
.hist-delta{font-size:11px;font-weight:700}
.hist-w{font-size:28px;font-weight:900;color:var(--accent);letter-spacing:-1px}

/* CHART */
.chart-wrap{background:var(--surface);border-radius:20px;padding:20px;margin-bottom:12px}
.chart-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.chart-svg{width:100%;overflow:visible}

/* TRAINING */
.exo-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.exo-name{font-size:15px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.km-box{background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.2);border-radius:12px;padding:10px 14px;text-align:center}
.km-dep-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.km-dep-val{font-size:20px;font-weight:900;color:var(--accent)}
.seance-type{font-size:16px;font-weight:800;color:var(--amber);text-transform:uppercase}
.tr-hist-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}

/* SOMMEIL */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.time-in{font-size:24px!important;font-weight:800!important;text-align:center!important;padding:14px!important}
.sleep-dur{display:flex;align-items:baseline;gap:6px;justify-content:center;padding:20px 0}
.sleep-h{font-size:64px;font-weight:900;letter-spacing:-3px;line-height:1}
.sleep-unit{font-size:14px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.sleep-status{text-align:center;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sleep-hist-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}

/* RECAP */
.recap-area{width:100%;padding:14px;background:var(--surface2);border:none;border-radius:14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;resize:none;line-height:1.6;min-height:130px}
.recap-area:focus{background:var(--surface3)}
.guide-toggle{background:none;border:none;color:var(--muted);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;padding:4px 0;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.guide-block{background:var(--surface2);border-left:3px solid var(--accent);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.guide-row{margin-bottom:8px}
.guide-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.guide-code{font-family:monospace;font-size:11px;color:var(--text2);background:var(--bg);padding:4px 8px;border-radius:6px}
.parsed-block{background:var(--surface);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid rgba(200,241,53,.2)}
.parsed-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.parsed-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.parsed-lbl{font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.parsed-sub{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px}
.parsed-table{width:100%;border-collapse:collapse;background:var(--surface2);border-radius:12px;overflow:hidden}
.parsed-table th{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px;text-align:right;border-bottom:1px solid var(--border);font-weight:600}
.parsed-table th:first-child{text-align:left}
.parsed-table td{padding:10px 10px;border-bottom:1px solid rgba(56,56,58,.5);font-size:13px;vertical-align:middle}
.parsed-table td:first-child{font-weight:700;padding-left:12px;font-size:14px}
.parsed-table td:not(:first-child){text-align:right;font-size:12px;font-weight:600}
.parsed-table tr:last-child td{border-bottom:none}
.td-kcal{color:var(--amber)}.td-prot{color:var(--pink)}.td-gluc{color:var(--blue)}.td-lip{color:var(--orange)}.td-empty{color:var(--muted)}
.parsed-total td{border-top:1px solid var(--border);font-weight:800}
.exo-parsed-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.12);border-radius:10px;margin-bottom:6px}
.exo-p-name{flex:1;font-size:14px;font-weight:700;text-transform:uppercase}
.exo-p-sets{font-size:18px;font-weight:900;color:var(--amber);line-height:1}
.exo-p-charge{font-size:11px;color:var(--purple);background:rgba(191,90,242,.1);border-radius:6px;padding:3px 8px;font-weight:700}

/* DB */
.db-item{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.db-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.db-name{font-weight:700;font-size:15px;text-transform:uppercase}
.db-ref{font-size:11px;color:var(--muted);margin-top:2px}
.incomplete{background:rgba(255,214,0,.12);color:var(--amber);border-radius:6px;padding:2px 7px;font-size:9px;font-weight:700;margin-left:6px}
.separator{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* SAVE */
.save-bar{display:flex;gap:8px;margin-bottom:14px}
.save-msg{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.2);color:var(--green);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:10px}

/* SEMAINE */
.wk-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.wk-box{background:var(--surface2);border-radius:14px;padding:16px;text-align:center}
.wk-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-1px}
.wk-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.wk-sub{font-size:10px;color:var(--muted);margin-top:3px}
.wk-day-row{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.wk-day-name{font-size:14px;font-weight:700;margin-bottom:4px}
.wk-day-tags{display:flex;gap:4px;flex-wrap:wrap}

/* SLBL */
.slbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.slbl.accent{color:var(--accent)}
.slbl.green{color:var(--green)}
.slbl.purple{color:var(--purple)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title-sm{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.micros-frame{width:100%;height:calc(100vh - 60px);border:none;display:block;}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>

function calcDuree(coucher,lever){
  if(!coucher||!lever)return null;
  const[hC,mC]=coucher.split(":").map(Number);
  const[hL,mL]=lever.split(":").map(Number);
  let mins=(hL*60+mL)-(hC*60+mC);
  if(mins<0)mins+=1440;
  return{h:Math.floor(mins/60),m:mins%60,total:mins};
}

// ─── PARSER ───────────────────────────────────────────────────────────────────
function parseRecap(text){
  const result={poids:null,repas:[],entrainement:{type:"",exercices:[]}};
  const pm=text.match(/poids[:\s]+(\d+[.,]\d+|\d+)\s*kg?/i);
  if(pm)result.poids=pm[1].replace(",",".");
  const seanceTypes=["push","pull","legs","leg day","full body","fullbody","chest","back","épaules","bras","cardio","pecs","dos","biceps","triceps"];
  for(const t of seanceTypes){if(text.toLowerCase().includes(t)){result.entrainement.type=t[0].toUpperCase()+t.slice(1);break;}}
  const exoRe=/([A-Za-zÀ-ÿ\s]+?)\s+(\d+)\s*[x×]\s*(\d+)\s*(?:reps?)?\s*@?\s*(\d+(?:[.,]\d+)?)\s*kg/gi;
  let m;
  while((m=exoRe.exec(text))!==null){const n=m[1].trim().replace(/[,;:-–]+$/,"").trim();if(n.length>1)result.entrainement.exercices.push({id:Date.now()+Math.random(),nom:n[0].toUpperCase()+n.slice(1),series:m[2],reps:m[3],charge:m[4].replace(",",".")});}
  const clean=text.replace(/[\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]/gu," ").replace(/[≈~•]/g,"").replace(/\s{2,}/g," ");
  const segs=clean.split(/[,;\n]+/);
  for(const seg of segs){
    const s=seg.trim();
    if(!s||s.toLowerCase().includes("poids")||/\d\s*[x×]\s*\d/.test(s))continue;
    const cal=s.match(/(\d+(?:[.,]\d+)?)\s*(?:kcal|cal)(?!\w)/i)?.[1];
    const prot=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:prot[eé]ines?|prot\b|(?<![a-zA-Z0-9])p(?![a-zA-Z0-9]))/i)?.[1];
    const gluc=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:glucides?|gluc\b)/i)?.[1];
    const lip=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:lipides?|lip\b|(?<![a-zA-Z0-9])l(?![a-zA-Z0-9]))/i)?.[1];
    if(!cal&&!prot)continue;
    const nm=s.match(/^([A-Za-zÀ-ÿ\s'\-]+?)(?=\s*\d)/);
    if(!nm)continue;
    const nom=nm[1].trim().replace(/[,;:\-–]+$/,"").trim();
    if(nom.length<2)continue;
    result.repas.push({id:Date.now()+Math.random(),nom:nom[0].toUpperCase()+nom.slice(1),cal:cal?String(parseFloat(cal.replace(",","."))):"",prot:prot?String(parseFloat(prot.replace(",","."))):"",gluc:gluc?String(parseFloat(gluc.replace(",","."))):"",lip:lip?String(parseFloat(lip.replace(",","."))):"",fib:""});
  }
  return result;
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
const el=(tag,attrs={},...children)=>{
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="className")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style")Object.assign(e.style,v);
    else if(k==="innerHTML")e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){if(c==null||c===false)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
};
const div=(cls,...ch)=>el("div",{className:cls},...ch);
const span=(cls,txt)=>el("span",{className:cls},txt);
const btn=(cls,txt,cb)=>el("button",{className:"btn "+cls,onClick:cb},txt);
const tag=(cls,txt)=>span("tag "+cls,txt);

  );
}

function makeBar(val,min,max,h=4){
  const pct=Math.min(100,max?(val/max)*100:0);

  const fill=el("div",{className:"bar-fill",style:{width:pct+"%",background:sColor(val,min,max)}});
  track.appendChild(fill);
  return track;
}

function renderWeightChart(wHistory){
  if(wHistory.length<2)return null;
  const W=340,H=140,PL=30,PR=10,PT=20,PB=30;
  const cW=W-PL-PR,cH=H-PT-PB;
  const weights=wHistory.map(w=>w.poids);
  const minW=Math.min(...weights,GOALS.poidsObjectif)-0.5;
  const maxW=Math.max(...weights)+0.5;
  const range=maxW-minW;
  const xScale=i=>PL+(i/(wHistory.length-1))*cW;
  const yScale=v=>PT+cH-((v-minW)/range)*cH;
  const pathD=wHistory.map((w,i)=>`${i===0?"M":"L"}${xScale(i)},${yScale(w.poids)}`).join(" ");
  const areaD=pathD+` L${xScale(wHistory.length-1)},${PT+cH} L${xScale(0)},${PT+cH} Z`;
  const goalY=yScale(GOALS.poidsObjectif);
  const lastX=xScale(wHistory.length-1);
  const lastY=yScale(wHistory[wHistory.length-1].poids);
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);svg.setAttribute("class","chart-svg");
  const defs=document.createElementNS(ns,"defs");
  const grad=document.createElementNS(ns,"linearGradient");
  grad.setAttribute("id","areaGrad");grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
  const s1=document.createElementNS(ns,"stop");s1.setAttribute("offset","0%");s1.setAttribute("stop-color","#c8f135");s1.setAttribute("stop-opacity","0.3");
  const s2=document.createElementNS(ns,"stop");s2.setAttribute("offset","100%");s2.setAttribute("stop-color","#c8f135");s2.setAttribute("stop-opacity","0");
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svg.appendChild(defs);
  const goalLine=document.createElementNS(ns,"line");
  goalLine.setAttribute("x1",PL);goalLine.setAttribute("x2",W-PR);goalLine.setAttribute("y1",goalY);goalLine.setAttribute("y2",goalY);
  goalLine.setAttribute("stroke","#30d158");goalLine.setAttribute("stroke-width","1");goalLine.setAttribute("stroke-dasharray","4,4");goalLine.setAttribute("opacity","0.6");
  svg.appendChild(goalLine);
  const goalLbl=document.createElementNS(ns,"text");
  goalLbl.setAttribute("x",W-PR-2);goalLbl.setAttribute("y",goalY-4);goalLbl.setAttribute("text-anchor","end");goalLbl.setAttribute("font-size","9");goalLbl.setAttribute("fill","#30d158");goalLbl.setAttribute("font-family","Inter,sans-serif");goalLbl.textContent=GOALS.poidsObjectif+"kg";
  svg.appendChild(goalLbl);
  const area=document.createElementNS(ns,"path");area.setAttribute("d",areaD);area.setAttribute("fill","url(#areaGrad)");svg.appendChild(area);
  const line=document.createElementNS(ns,"path");line.setAttribute("d",pathD);line.setAttribute("stroke","#c8f135");line.setAttribute("stroke-width","2.5");line.setAttribute("fill","none");line.setAttribute("stroke-linecap","round");line.setAttribute("stroke-linejoin","round");svg.appendChild(line);
  wHistory.forEach((w,i)=>{
    if(i!==0&&i!==wHistory.length-1&&i%Math.max(1,Math.floor(wHistory.length/5))!==0)return;
    const dot=document.createElementNS(ns,"circle");dot.setAttribute("cx",xScale(i));dot.setAttribute("cy",yScale(w.poids));dot.setAttribute("r",i===wHistory.length-1?"5":"3");dot.setAttribute("fill","#c8f135");svg.appendChild(dot);
  });
  const lastVal=document.createElementNS(ns,"text");lastVal.setAttribute("x",lastX);lastVal.setAttribute("y",lastY-12);lastVal.setAttribute("text-anchor","middle");lastVal.setAttribute("font-size","11");lastVal.setAttribute("font-weight","700");lastVal.setAttribute("fill","#ffffff");lastVal.setAttribute("font-family","Inter,sans-serif");lastVal.textContent=wHistory[wHistory.length-1].poids+"kg";svg.appendChild(lastVal);
  [[0,wHistory[0].date],[wHistory.length-1,wHistory[wHistory.length-1].date]].forEach(([i,d])=>{
    const[y,m,dy]=d.split("-");const lbl=document.createElementNS(ns,"text");lbl.setAttribute("x",xScale(i));lbl.setAttribute("y",H-4);lbl.setAttribute("text-anchor",i===0?"start":"end");lbl.setAttribute("font-size","9");lbl.setAttribute("fill","#8e8e93");lbl.setAttribute("font-family","Inter,sans-serif");lbl.textContent=dy+"/"+m;svg.appendChild(lbl);
  });
  return svg;
}

// ─── TAB: SEMAINE ─────────────────────────────────────────────────────────────
function renderSemaine(){
  const frag=document.createDocumentFragment();
  const today=new Date(state.date);
  const days7=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-6+i);return d.toISOString().slice(0,10);});
  const daysWithData=days7.map(d=>({date:d,day:getDay(d)})).filter(x=>x.day.repas.length>0||x.day.poids||x.day.entrainement?.type||x.day.sommeil?.coucher);
  const daysWithMeals=daysWithData.filter(x=>x.day.repas.length>0);
  let avgMac=null;
  if(daysWithMeals.length>0){
    avgMac=daysWithMeals.reduce((a,x)=>{const m=sumMacros(x.day.repas);return{cal:a.cal+m.cal,prot:a.prot+m.prot,gluc:a.gluc+m.gluc,lip:a.lip+m.lip};},{cal:0,prot:0,gluc:0,lip:0});
    ["cal","prot","gluc","lip"].forEach(k=>avgMac[k]=Math.round(avgMac[k]/daysWithMeals.length));
  }
  const daysWithSleep=daysWithData.filter(x=>x.day.sommeil?.coucher&&x.day.sommeil?.lever);
  const avgSleepMins=daysWithSleep.length>0?daysWithSleep.reduce((a,x)=>{const d=calcDuree(x.day.sommeil.coucher,x.day.sommeil.lever);return a+(d?d.total:0);},0)/daysWithSleep.length:null;
  const sleepC=avgSleepMins?(avgSleepMins>=450?"var(--accent)":avgSleepMins>=360?"var(--amber)":"var(--danger)"):"var(--muted)";
  const totalKm=daysWithData.reduce((a,x)=>a+(Number(x.day.entrainement?.km)||0),0);
  const poidsWeek=daysWithData.filter(x=>x.day.poids).map(x=>({date:x.date,poids:parseFloat(x.day.poids)}));
  const deltaP=(poidsWeek.length>=2)?poidsWeek[poidsWeek.length-1].poids-poidsWeek[0].poids:null;
  const nbSeances=daysWithData.filter(x=>x.day.entrainement?.type).length;
  const card=el("div",{className:"card fade-in"});
  card.appendChild(el("div",{className:"slbl accent"},"Semaine du "+fmtDate(days7[0])+" → "+fmtDate(days7[6])));
  if(avgMac){
    card.appendChild(el("div",{className:"slbl",style:{marginBottom:"8px"}},"Macros moy. ("+daysWithMeals.length+" jours)"));
    const mb=el("div",{style:{background:"var(--surface2)",borderRadius:"14px",padding:"14px 16px",marginBottom:"14px"}});
    const cr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"8px"}});
    cr.appendChild(el("div",{style:{fontSize:"42px",fontWeight:"900",color:sColor(avgMac.cal,GOALS.calories.min,GOALS.calories.max),letterSpacing:"-2px"}},String(avgMac.cal)));
    cr.appendChild(el("div",{style:{fontSize:"11px",color:"var(--muted)",fontWeight:"600"}},"2100–2200 kcal"));
    mb.appendChild(cr);
    const tgs=div("tags");[["t-prot",avgMac.prot+"g P"],["t-gluc",avgMac.gluc+"g G"],["t-lip",avgMac.lip+"g L"]].forEach(([c,t])=>tgs.appendChild(tag(c,t)));
    mb.appendChild(tgs);card.appendChild(mb);
  }
  const sg=el("div",{className:"wk-stat-grid"});
  [{val:avgSleepMins?Math.floor(avgSleepMins/60)+"h"+(Math.round(avgSleepMins%60)>0?Math.round(avgSleepMins%60)+"m":""):"—",lbl:"Sommeil moy.",sub:daysWithSleep.length+" nuits",c:sleepC},
   {val:totalKm>0?totalKm.toFixed(1)+"km":"—",lbl:"Km marchés",sub:Math.round(totalKm*51.9)+" kcal",c:totalKm>0?"var(--accent)":"var(--muted)"},
   {val:deltaP!==null?(deltaP<=0?"▼":"▲")+Math.abs(deltaP).toFixed(1):"—",lbl:"Évol. poids",sub:poidsWeek.length>=2?poidsWeek[0].poids+"→"+poidsWeek[poidsWeek.length-1].poids+" kg":"—",c:deltaP!==null?(deltaP<=0?"var(--accent)":"var(--danger)"):"var(--muted)"},
   {val:String(nbSeances),lbl:"Séances",sub:"sur 7 jours",c:nbSeances>0?"var(--amber)":"var(--muted)"}
  ].forEach(s=>{
    const b=div("wk-box");b.appendChild(el("div",{className:"wk-val",style:{color:s.c}},s.val));b.appendChild(el("div",{className:"wk-lbl"},s.lbl));b.appendChild(el("div",{className:"wk-sub"},s.sub));sg.appendChild(b);
  });
  card.appendChild(sg);frag.appendChild(card);
  frag.appendChild(el("div",{className:"slbl",style:{margin:"6px 0 10px"}},"Détail par jour"));
  [...daysWithData].reverse().forEach(({date:d,day:dy})=>{
    const m=sumMacros(dy.repas);const dur=calcDuree(dy.sommeil?.coucher,dy.sommeil?.lever);
    const sleepC2=dur?(dur.total>=450?"var(--accent)":dur.total>=360?"var(--amber)":"var(--danger)"):"var(--muted)";
    const row=el("div",{className:"wk-day-row",onClick:()=>{state.date=d;state.tab="nutrition";render();}});
    const left=div("");left.appendChild(el("div",{className:"wk-day-name"},fmtDate(d)+(d===todayStr()?" · Aujourd'hui":"")));
    const tgs=div("wk-day-tags");
    if(m.cal>0)tgs.appendChild(tag("t-kcal",m.cal+" kcal"));
    if(m.prot>0)tgs.appendChild(tag("t-prot",m.prot+"g P"));
    if(dur)tgs.appendChild(el("span",{className:"tag",style:{background:"rgba(191,90,242,.1)",color:sleepC2,fontSize:"10px"}},dur.h+"h"+(dur.m>0?dur.m+"m":"")));
    if(dy.entrainement?.type)tgs.appendChild(tag("t-kcal",dy.entrainement.type));
    if(dy.entrainement?.km)tgs.appendChild(tag("t-gluc",dy.entrainement.km+"km"));
    left.appendChild(tgs);row.appendChild(left);
    if(dy.poids)row.appendChild(el("div",{style:{fontSize:"22px",fontWeight:"900",color:"var(--accent)",letterSpacing:"-1px"}},dy.poids,el("span",{style:{fontSize:"12px",color:"var(--muted)",fontWeight:"600"}},"kg")));
    frag.appendChild(row);
  });
  return frag;
}
