<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Mon Suivi</title>
<link rel="manifest" href="manifest.json"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Mon Suivi"/><style>body{-webkit-font-smoothing:antialiased;}</style>
<style>
:root{--bg:#f2f2f7;--surface:#ffffff;--surface2:#e5e5ea;--border:#d1d1d6;--border2:#c7c7cc;--text:#000000;--muted:#8e8e93;--subtle:#6d6d72;--accent:#0a84ff;--accent2:#0060df;--green:#34c759;--amber:#ff9500;--danger:#ff3b30;--pink:#ff2d55;--purple:#af52de;--orange:#ff9500}
*{-webkit-tap-highlight-color:transparent;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:var(--text)}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
/* HEADER */
.header{background:rgba(6,8,9,.95);padding:16px 16px 0;position:sticky;top:0;z-index:99;border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.brand-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:10px;font-weight:600;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:3px}
.brand-title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:28px;color:var(--text);text-transform:uppercase;line-height:1}
.date-pick{background:var(--surface2);border:1px solid var(--border2);color:var(--accent);border-radius:8px;padding:6px 10px;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-weight:700;outline:none}
.stats-row{display:flex;gap:5px;margin-bottom:12px}
.chip{flex:1;background:var(--surface);border-radius:8px;padding:8px 8px;border:1px solid var(--border);min-width:0}
.chip-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:8px;font-weight:600;color:var(--subtle);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.chip-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:11px 12px;background:none;border:none;border-bottom:2px solid transparent;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--subtle);white-space:nowrap;transition:all .2s}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}
/* CONTENT */
.content{padding:16px}
.card{background:var(--surface);border-radius:16px;padding:18px;border:1px solid var(--border);margin-bottom:12px}
.card.accent{border-color:rgba(0,229,255,.2)}
.card.green{border-color:rgba(105,255,71,.2)}
.card.purple{border-color:rgba(213,128,255,.2)}
.slbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:10px;font-weight:700;color:var(--subtle);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px}
.slbl.accent{color:var(--accent)}
.slbl.green{color:var(--green)}
.slbl.purple{color:var(--purple)}
/* BILAN */
.cal-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cal-big{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:52px;line-height:1;letter-spacing:-1px}
.cal-goal{font-family:'SF Mono',SFMono-Regular,monospace;font-size:10px;color:var(--subtle)}
.bar-track{height:6px;border-radius:99px;background:var(--border);overflow:hidden;margin-bottom:2px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.macros-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:14px}
.mcell{background:var(--surface2);border-radius:8px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.mcell-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:22px;line-height:1;margin-bottom:2px}
.mcell-unit{font-family:'SF Mono',SFMono-Regular,monospace;font-size:7px;color:var(--muted)}
.mcell-name{font-size:8px;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;font-weight:600}
.mcell-range{font-family:'SF Mono',SFMono-Regular,monospace;font-size:7px;color:var(--muted);margin-top:1px}
.mbar{height:3px;border-radius:99px;background:var(--border);margin-top:5px;overflow:hidden}
/* REPAS SECTION */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.3px}
/* REPAS TYPE SELECTOR */
.rtype-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
/* MODE BAR */
.mode-bar{display:flex;gap:6px;margin-bottom:12px}
/* REPAS GROUP */
.rgroup{margin-bottom:14px}
.rgroup-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.rgroup-name{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.rgroup-line{flex:1;height:1px;background:var(--border)}
.rgroup-sum{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:11px;color:var(--subtle);font-weight:600}
/* FOOD ROW */
.food-row{background:var(--surface2);border-radius:9px;padding:11px 12px;margin-bottom:7px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.food-name{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{border-radius:4px;padding:2px 7px;font-size:10px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-weight:700;letter-spacing:.5px}
.t-kcal{background:rgba(255,214,0,.1);color:var(--amber);border:1px solid rgba(255,214,0,.2)}
.t-prot{background:rgba(255,64,129,.1);color:var(--pink);border:1px solid rgba(255,64,129,.2)}
.t-gluc{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2)}
.t-lip{background:rgba(255,109,0,.1);color:var(--orange);border:1px solid rgba(255,109,0,.2)}
.t-fib{background:rgba(105,255,71,.1);color:var(--green);border:1px solid rgba(105,255,71,.2)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1;border-radius:4px}
.del-btn:hover{color:var(--danger)}
/* FORM */
.form-card{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--border2);margin-bottom:10px}
.inp-wrap{margin-bottom:8px}
.inp-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
input[type=text],input[type=number],input[type=time],textarea,select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* BUTTONS */
.btn{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;cursor:pointer;border:none;transition:all .15s;letter-spacing:1.5px;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000}
.btn-ghost{background:var(--surface2);color:var(--subtle);border:1px solid var(--border2)}
.btn-green{background:var(--green);color:#000;font-weight:800}
.btn-amber{background:var(--amber);color:#000;font-weight:800}
.btn-danger{background:rgba(255,61,113,.15);color:var(--danger);border:1px solid rgba(255,61,113,.25)}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:6px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
/* AUTOCOMPLETE */
.ac-wrap{position:relative;margin-bottom:8px}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:#0a1318;border:1px solid var(--border2);border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;margin-top:3px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ac-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:rgba(0,229,255,.08)}
.ac-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.ac-ref{font-size:10px;color:var(--muted);margin-top:1px}
.ac-meta{font-family:'SF Mono',SFMono-Regular,monospace;font-size:10px;color:var(--subtle)}
.portion-row{display:flex;align-items:center;gap:10px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.portion-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;flex:1}
.portion-in{width:70px!important;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:18px;text-align:center;padding:6px 8px!important}
.macro-prev{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
/* POIDS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-stat{text-align:center}
.prog-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:8px;font-weight:600;color:var(--subtle);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.prog-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:30px;line-height:1}
.prog-val-sm{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:20px;line-height:1}
.delta{text-align:center;margin-top:10px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px}
.hist-row{background:var(--surface2);border-radius:9px;padding:12px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.hist-date{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:13px;font-weight:600;color:var(--subtle);margin-bottom:3px}
.hist-delta{font-size:11px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
.hist-w{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:26px;color:var(--accent)}
/* TRAINING */
.exo-row{background:var(--surface2);border-radius:10px;padding:12px 13px;margin-bottom:7px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.exo-name{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.km-box{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:8px;padding:8px 12px;text-align:center;white-space:nowrap}
.km-dep-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:8px;font-weight:700;color:var(--subtle);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.km-dep-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:18px;color:var(--accent)}
.seance-type{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:15px;color:var(--amber);text-transform:uppercase}
.tr-hist-row{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
/* SOMMEIL */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.time-in{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700!important;font-size:22px!important;text-align:center!important;padding:12px!important}
.sleep-dur{display:flex;align-items:baseline;gap:6px;justify-content:center;padding:18px 0}
.sleep-h{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:52px;letter-spacing:-2px;line-height:1}
.sleep-unit{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:13px;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.sleep-status{text-align:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sleep-hist-row{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:7px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
/* RECAP */
.recap-area{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;outline:none;resize:none;line-height:1.6;min-height:120px;transition:border-color .2s}
.recap-area:focus{border-color:var(--accent)}
.recap-area::placeholder{color:var(--muted)}
.guide-toggle{background:none;border:none;color:var(--subtle);font-size:10px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;cursor:pointer;padding:4px 0;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.guide-block{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;padding:10px 13px;margin-bottom:10px}
.guide-row{margin-bottom:7px}
.guide-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;font-family:'SF Mono',SFMono-Regular,monospace;letter-spacing:1px;text-transform:uppercase}
.guide-code{font-family:'SF Mono',SFMono-Regular,monospace;font-size:10px;color:var(--subtle);background:var(--bg);padding:4px 8px;border-radius:5px}
.parsed-block{background:var(--surface);border:1px solid rgba(105,255,71,.2);border-radius:12px;padding:16px;margin-bottom:10px}
.parsed-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.parsed-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.parsed-lbl{font-family:'SF Mono',SFMono-Regular,monospace;font-size:9px;color:var(--green);letter-spacing:2px;text-transform:uppercase}
.parsed-sub{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:2.5px;text-transform:uppercase;margin:10px 0 7px}
.parsed-table{width:100%;border-collapse:collapse;background:var(--surface2);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.parsed-table th{font-family:'SF Mono',SFMono-Regular,monospace;font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);font-weight:400}
.parsed-table th:first-child{text-align:left}
.parsed-table td{padding:9px 8px;border-bottom:1px solid rgba(15,32,48,.6);font-size:12px;vertical-align:middle}
.parsed-table td:first-child{font-weight:700;color:var(--text);padding-left:10px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:13px}
.parsed-table td:not(:first-child){text-align:right;font-family:'SF Mono',SFMono-Regular,monospace;font-size:11px}
.parsed-table tr:last-child td{border-bottom:none}
.td-kcal{color:var(--amber)}.td-prot{color:var(--pink)}.td-gluc{color:var(--accent)}.td-lip{color:var(--orange)}.td-empty{color:var(--muted)}
.parsed-total td{border-top:1px solid var(--border2);font-weight:700}
.exo-parsed-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,214,0,.04);border:1px solid rgba(255,214,0,.12);border-radius:8px;margin-bottom:6px}
.exo-p-name{flex:1;font-size:13px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;text-transform:uppercase}
.exo-p-sets{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:17px;color:var(--amber);line-height:1}
.exo-p-charge{font-family:'SF Mono',SFMono-Regular,monospace;font-size:10px;color:var(--purple);background:rgba(213,128,255,.1);border:1px solid rgba(213,128,255,.2);border-radius:5px;padding:2px 7px}
/* DB */
.db-item{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:7px;border:1px solid var(--border)}
.db-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.db-name{font-weight:700;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;letter-spacing:.3px;text-transform:uppercase}
.db-ref{font-size:10px;color:var(--subtle);margin-top:1px}
.incomplete{background:rgba(255,214,0,.12);color:var(--amber);border:1px solid rgba(255,214,0,.2);border-radius:5px;padding:1px 6px;font-size:9px;font-family:'SF Mono',SFMono-Regular,monospace;margin-left:6px}
.separator{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;color:var(--subtle);padding:30px 0;font-size:11px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase}
/* SAVE/RESTORE */
.save-bar{display:flex;gap:8px;margin-bottom:14px}
.save-msg{background:rgba(105,255,71,.1);border:1px solid rgba(105,255,71,.2);color:var(--green);border-radius:8px;padding:10px 14px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
/* SEMAINE */
.wk-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.wk-box{background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border);text-align:center}
.wk-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-weight:700;font-size:26px;line-height:1;margin-bottom:3px}
.wk-lbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:9px;font-weight:700;color:var(--subtle);letter-spacing:2px;text-transform:uppercase}
.wk-sub{font-family:'SF Mono',SFMono-Regular,monospace;font-size:9px;color:var(--muted);margin-top:3px}
.wk-day-row{background:var(--surface2);border-radius:9px;padding:11px 13px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.wk-day-name{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.wk-day-tags{display:flex;gap:4px;flex-wrap:wrap}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="brand-lbl">// Coach Tracker</div>
        <div class="brand-title">Mon Suivi</div>
      </div>
      <input type="date" class="date-pick" id="datePick"/>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="tabs" id="tabBar"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const GOALS = {
  calories:{min:2100,max:2200}, proteines:{min:160,max:170},
  glucides:{min:220,max:260}, lipides:{min:50,max:70}, fibres:{min:25,max:40},
  poidsDepart:73.2, poidsObjectif:71.5
};
const REPAS_TYPES = ["petit-déj","déjeuner","goûter","dîner"];
const REPAS_ICONS = {"petit-déj":"🌅","déjeuner":"☀️","goûter":"🍎","dîner":"🌙"};
const STORAGE_KEY = "ft_v5";
const DB_KEY = "ft_db_v1";

const INITIAL_DATA = {

function calcDuree(coucher, lever) {
  if (!coucher||!lever) return null;
  const [hC,mC]=coucher.split(":").map(Number);
  const [hL,mL]=lever.split(":").map(Number);
  let mins=(hL*60+mL)-(hC*60+mC);
  if(mins<0) mins+=1440;
  return {h:Math.floor(mins/60), m:mins%60, total:mins};
}

// ─── PARSER ───────────────────────────────────────────────────────────────────
function parseRecap(text) {
  const result = {poids:null, repas:[], entrainement:{type:"",exercices:[]}};
  const pm = text.match(/poids[:\s]+(\d+[.,]\d+|\d+)\s*kg?/i);
  if (pm) result.poids = pm[1].replace(",",".");
  const seanceTypes = ["push","pull","legs","leg day","full body","fullbody","chest","back","épaules","bras","cardio","pecs","dos","biceps","triceps"];
  for (const t of seanceTypes) {
    if (text.toLowerCase().includes(t)) { result.entrainement.type = t[0].toUpperCase()+t.slice(1); break; }
  }
  const exoRe = /([A-Za-zÀ-ÿ\s]+?)\s+(\d+)\s*[x×]\s*(\d+)\s*(?:reps?)?\s*@?\s*(\d+(?:[.,]\d+)?)\s*kg/gi;
  let m;
  while ((m=exoRe.exec(text))!==null) {
    const n=m[1].trim().replace(/[,;:-–]+$/,"").trim();
    if (n.length>1) result.entrainement.exercices.push({id:Date.now()+Math.random(),nom:n[0].toUpperCase()+n.slice(1),series:m[2],reps:m[3],charge:m[4].replace(",",".")});
  }
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]/gu," ").replace(/[≈~•]/g,"").replace(/\s{2,}/g," ");
  const segs = clean.split(/[,;\n]+/);
  for (const seg of segs) {
    const s=seg.trim();
    if (!s||s.toLowerCase().includes("poids")||/\d\s*[x×]\s*\d/.test(s)) continue;
    const cal=s.match(/(\d+(?:[.,]\d+)?)\s*(?:kcal|cal)(?!\w)/i)?.[1];
    const prot=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:prot[eé]ines?|prot\b|(?<![a-zA-Z0-9])p(?![a-zA-Z0-9]))/i)?.[1];
    const gluc=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:glucides?|gluc\b)/i)?.[1];
    const lip=s.match(/(\d+(?:[.,]\d+)?)\s*g?\s*(?:lipides?|lip\b|(?<![a-zA-Z0-9])l(?![a-zA-Z0-9]))/i)?.[1];
    if (!cal&&!prot) continue;
    const nm=s.match(/^([A-Za-zÀ-ÿ\s'\-]+?)(?=\s*\d)/);
    if (!nm) continue;
    const nom=nm[1].trim().replace(/[,;:\-–]+$/,"").trim();
    if (nom.length<2) continue;
    result.repas.push({id:Date.now()+Math.random(),nom:nom[0].toUpperCase()+nom.slice(1),cal:cal?String(parseFloat(cal.replace(",","."))):"",prot:prot?String(parseFloat(prot.replace(",","."))):"",gluc:gluc?String(parseFloat(gluc.replace(",","."))):"",lip:lip?String(parseFloat(lip.replace(",","."))):"",fib:""});
  }
  return result;
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==="className") e.className=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="style") Object.assign(e.style, v);
    else if (k==="innerHTML") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for (const c of children) {
    if (c==null||c===false) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
};
const div = (cls, ...ch) => el("div",{className:cls},...ch);
const span = (cls, txt) => el("span",{className:cls},txt);
const btn = (cls, txt, cb) => el("button",{className:"btn "+cls, onClick:cb},txt);
const tag = (cls, txt) => span("tag "+cls, txt);

function makeFoodRow(r, onDel) {
  return el("div",{className:"food-row"},
    el("div",{},
      el("div",{className:"food-name"},r.nom),
      el("div",{className:"tags"},
        r.cal&&tag("t-kcal",r.cal+" kcal"),
        r.prot&&tag("t-prot",r.prot+"g P"),
        r.gluc&&tag("t-gluc",r.gluc+"g G"),
        r.lip&&tag("t-lip",r.lip+"g L"),
        r.fib&&Number(r.fib)>0&&tag("t-fib",r.fib+"g F"),
      )
    ),
    el("button",{className:"del-btn",onClick:onDel},"×")
  );
}

function makeInp(lbl, val, cb, type="text", ph="") {
  const wrap = div("inp-wrap");
  if(lbl) { const l=el("div",{className:"inp-lbl"},lbl); wrap.appendChild(l); }
  const input = el("input",{type,value:val,placeholder:ph,onInput:e=>cb(e.target.value)});
  wrap.appendChild(input);
  return wrap;
}

function makeBar(val,min,max,h=6) {
  const pct = Math.min(100, max?(val/max)*100:0);
  const track = el("div",{className:"bar-track",style:{height:h+"px"}});
  const fill = el("div",{className:"bar-fill",style:{width:pct+"%",background:sColor(val,min,max)}});
  track.appendChild(fill);
  return track;
}

// ─── TAB: SEMAINE ─────────────────────────────────────────────────────────────
function renderSemaine() {
  const frag=document.createDocumentFragment();
  const today=new Date(state.date);
  const days7=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-6+i);return d.toISOString().slice(0,10);});
  const daysWithData=days7.map(d=>({date:d,day:getDay(d)})).filter(x=>x.day.repas.length>0||x.day.poids||x.day.entrainement?.type||x.day.sommeil?.coucher);
  const daysWithMeals=daysWithData.filter(x=>x.day.repas.length>0);

  let avgMac=null;
  if (daysWithMeals.length>0) {
    avgMac=daysWithMeals.reduce((a,x)=>{const m=sumMacros(x.day.repas);return{cal:a.cal+m.cal,prot:a.prot+m.prot,gluc:a.gluc+m.gluc,lip:a.lip+m.lip};},{cal:0,prot:0,gluc:0,lip:0});
    ["cal","prot","gluc","lip"].forEach(k=>avgMac[k]=Math.round(avgMac[k]/daysWithMeals.length));
  }
  const daysWithSleep=daysWithData.filter(x=>x.day.sommeil?.coucher&&x.day.sommeil?.lever);
  const avgSleepMins=daysWithSleep.length>0?daysWithSleep.reduce((a,x)=>{const d=calcDuree(x.day.sommeil.coucher,x.day.sommeil.lever);return a+(d?d.total:0);},0)/daysWithSleep.length:null;
  const sleepC=avgSleepMins?(avgSleepMins>=450?"var(--green)":avgSleepMins>=360?"var(--amber)":"var(--danger)"):"var(--muted)";
  const totalKm=daysWithData.reduce((a,x)=>a+(Number(x.day.entrainement?.km)||0),0);
  const poidsWeek=daysWithData.filter(x=>x.day.poids).map(x=>({date:x.date,poids:parseFloat(x.day.poids)}));
  const deltaP=(poidsWeek.length>=2)?poidsWeek[poidsWeek.length-1].poids-poidsWeek[0].poids:null;

    const mb=el("div",{style:{background:"var(--surface2)",borderRadius:"10px",padding:"12px 14px",border:"1px solid var(--border)",marginBottom:"12px"}});
    const cr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}});
    cr.appendChild(el("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"36px",color:sColor(avgMac.cal,GOALS.calories.min,GOALS.calories.max),letterSpacing:"-1px"}},String(avgMac.cal)));
    cr.appendChild(el("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--subtle)"}},"2100–2200 kcal"));
    mb.appendChild(cr);
    const tgs=div("tags"); [["t-prot",avgMac.prot+"g P"],["t-gluc",avgMac.gluc+"g G"],["t-lip",avgMac.lip+"g L"]].forEach(([c,t])=>tgs.appendChild(tag(c,t)));
    mb.appendChild(tgs); card.appendChild(mb);
  }

  const sg=el("div",{className:"wk-stat-grid"});
  [{val:avgSleepMins?Math.floor(avgSleepMins/60)+"h"+(Math.round(avgSleepMins%60)>0?Math.round(avgSleepMins%60)+"m":""):"—",lbl:"Sommeil moy.",sub:daysWithSleep.length+" nuits",c:sleepC},
   {val:totalKm>0?totalKm.toFixed(1)+"km":"—",lbl:"Km marchés",sub:Math.round(totalKm*52)+" kcal nettes",c:totalKm>0?"var(--accent)":"var(--muted)"},
   {val:deltaP!==null?(deltaP<=0?"▼":"▲")+Math.abs(deltaP).toFixed(1):"—",lbl:"Évol. poids",sub:poidsWeek.length>=2?poidsWeek[0].poids+"→"+poidsWeek[poidsWeek.length-1].poids+" kg":"pas de données",c:deltaP!==null?(deltaP<=0?"var(--green)":"var(--danger)"):"var(--muted)"},
   {val:String(nbSeances),lbl:"Séances",sub:"sur 7 jours",c:nbSeances>0?"var(--amber)":"var(--muted)"}
  ].forEach(s=>{
    const b=div("wk-box");
    b.appendChild(el("div",{className:"wk-val",style:{color:s.c}},s.val));
    b.appendChild(el("div",{className:"wk-lbl"},s.lbl));
    b.appendChild(el("div",{className:"wk-sub"},s.sub));
    sg.appendChild(b);
  });
  card.appendChild(sg);
  frag.appendChild(card);

  frag.appendChild(el("div",{className:"slbl",style:{margin:"6px 0 10px"}},"Détail par jour"));
  [...daysWithData].reverse().forEach(({date:d,day:dy})=>{
    const m=sumMacros(dy.repas);
    const dur=calcDuree(dy.sommeil?.coucher,dy.sommeil?.lever);

    const row=el("div",{className:"wk-day-row",onClick:()=>{state.date=d;state.tab="nutrition";render();}});
    const left=div(""); left.appendChild(el("div",{className:"wk-day-name"},fmtDate(d)+(d===todayStr()?" · Aujourd'hui":"")));

    if(dur) tgs.appendChild(el("span",{className:"tag",style:{background:"rgba(213,128,255,.1)",color:sleepC2,border:`1px solid ${sleepC2}33`,fontSize:"10px"}},dur.h+"h"+(dur.m>0?dur.m+"m":"")));

    frag.appendChild(row);
  });
  return frag;
}

  const tb=document.getElementById("tabBar");
  tb.innerHTML="";
  [{id:"recap",icon:"▲",lbl:"Récap"},{id:"nutrition",icon:"◈",lbl:"Nutri"},{id:"poids",icon:"○",lbl:"Poids"},{id:"training",icon:"◆",lbl:"Training"},{id:"sommeil",icon:"☾",lbl:"Sommeil"},{id:"semaine",icon:"◉",lbl:"Semaine"}].forEach(t=>{
    const b=el("button",{className:"tab"+(state.tab===t.id?" active":""),onClick:()=>{state.tab=t.id;render();}},t.icon+" "+t.lbl);
    tb.appendChild(b);
  });

  // Content
  const c=document.getElementById("content");
  c.innerHTML="";
  const tabMap={recap:renderRecap,nutrition:renderNutrition,poids:renderPoids,training:renderTraining,sommeil:renderSommeil,semaine:renderSemaine};
  if (tabMap[state.tab]) c.appendChild(tabMap[state.tab]());
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
loadDb();
state.date=todayStr();

document.getElementById("datePick").addEventListener("change",e=>{
  state.date=e.target.value; render();
});

render();
</script>
